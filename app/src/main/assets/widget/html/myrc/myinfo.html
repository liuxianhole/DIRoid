<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title>title</title>	
    <link rel="stylesheet" type="text/css" href="../../css/api.css" />
    <link rel="stylesheet" type="text/css" href="../../css/aui.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>	
	<link rel="stylesheet" type="text/css" href="../../css/common.css"/>
    <style>
    	.db-myinfo-title {
		    width: 40px;
		}
    </style>
</head>
<body>
	<div class="db-bg-white">
		<div class="aui-padded-15  zz-div-box">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-myinfo-title">姓名</div>
			<div class="zz-div-td1">
				<input type="text" class="aui-margin-b-0 mustipt contact" placeholder="请输入姓名">
			</div>
		</div>
		<div class="aui-padded-15  zz-div-box">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-myinfo-title">性别</div>
			<div class="zz-div-td1 sex">
				<input class="aui-radio aui-radio-success" value="男" type="radio" name="demo1" checked><div class="aui-radio-name">男</div>
        		<input class="aui-radio aui-radio-success" value="女" type="radio" name="demo1"><div class="aui-radio-name">女</div>
			</div>
		</div>
		<div class="aui-padded-15  zz-div-box">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-myinfo-title">手机</div>
			<div class="zz-div-td1">
				<input type="text" class="aui-margin-b-0 mustipt mobile" placeholder="请输入手机">
			</div>
		</div>
		<div class="aui-padded-15  zz-div-box">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-myinfo-title">密码</div>
			<div class="zz-div-td1">
				<input type="text" class="aui-margin-b-0 pwd" placeholder="请输入密码">
				<input class="aui-checkbox ischange_pwd" type="checkbox" value="1">
        		<div class="aui-checkbox-name">是否更改密码</div>
			</div>
		</div>
		<div class="aui-padded-15  zz-div-box">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-myinfo-title"></div>
			<div class="zz-div-td1">
				<div class="aui-btn aui-btn-success btn-keep">&nbsp;保存&nbsp;</div>
			</div>
		</div>
		
	</div>
	<div style="margin: 50px;text-align: center;"><a class="aui-btn layui-btn-danger loginout">&nbsp;退出重新登录&nbsp;</a></div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var canseve = true;//按钮点击提交可以提交
	apiready = function(){
		changeserverurl()
		var login_sn = UserInfo.has_login();
		if (login_sn){
			//获取个人信息
			getInfo();
		}
		
		//dom事件
		domEvent();
	};
	//dom事件
	var user_id=0;//个人id
	
	var domEvent = function(){
		$(".btn-keep").on("click",function(){
			if(!canseve){
				return;
			}
			var mobile = $(".mobile").val();
			var contact = $(".contact").val();
			var pwd = $(".pwd").val();
			if (user_id==0 || !user_id){
				hint("数据读取错误！");
				return;
			}
			if (contact.length == 0) {
				hint("姓名不能为空！");
				api.hideProgress();
				return;
			}
			
			if (mobile.length == 0) {
				hint("手机号不能为空！");
				api.hideProgress();
				return;
			}
			var data = {
				user_id:user_id,
				mobile:mobile,
				contact:contact,
				sex:$(".sex input[type='radio']:checked").val(),
				pwd:pwd
			}
			if($(".ischange_pwd[type='checkbox']").is(':checked')&&pwd.length > 0){
				data.ischange_pwd = 1;
			}
			api.showProgress({
				title : '数据加载中',
				modal : false
			});
			canseve = false;
			zzappajax("post",hosturl+"app/myinfo_save.html",data,function(ret){
				if(ret.err=="false"){
					api.alert({
						title : '',
						msg : '修改成功！',
						buttons : ['确定']
					}, function(ret, err) {
						api.hideProgress();
						canseve = true;
					});
				}else{
					layer.msg(ret.errtext);
					api.hideProgress();
				}
				canseve = true;
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				canAjax = true;
				api.hideProgress();
				return false;
			})
		})
		
		$(".loginout").on("click",function(){
			UserInfo.clear();
			api.execScript({
				name : "root",
				script : "reloadapp();"
			});
			api.closeWin({
            });
		})
	}
	//获取个人信息
	var getInfo = function(){
		api.showProgress({
			title : '数据加载中',
			modal : false
		});
		var data={
		}
		zzappajax("post",hosturl+"app/myinfo.html",data,function(ret){
			$(".contact").val(ret.contact);
			if(ret.sex=="男"){
				$('.sex input:radio:first').attr('checked', 'checked');
			}else{
				$('.sex input:radio:last').attr('checked', 'checked');
			}
			$(".mobile").val(ret.mobile);
			api.hideProgress();
			user_id = ret.id;//个人id
		},function(err){
			if(err){
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
		})
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
