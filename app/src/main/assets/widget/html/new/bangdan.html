<!doctype html>
<html>

<head>
	<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
	<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
	<meta content="telephone=no" name="format-detection" />
	<meta content="address=no" name="format-detection" />
	<meta name="apple-mobile-web-app-capable" content="no" />
	<link rel="apple-touch-icon-precomposed" href="../../image/logo.png" />
	<link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-precomposed" />
	<meta name="apple-touch-fullscreen" content="YES">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link rel="shortcut icon" href="../../image/favicon.ico" />
	<title>智慧农业收购管理系统</title>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<script type="text/javascript" src="../../script/layer/layer.js"></script>
	<link href="../../css/mobiscroll.custom-2.6.2.min.css" rel="stylesheet"
		type="text/css" />
	<script src="../../script/mobiscroll.custom-2.6.2.min.js"
		type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
	<style>
		.search-action-btn {
			width: 100%;
			padding: 0;
		}
	</style>
</head>

<body>
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav  aui-border-b ">
			<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript :history.back(-1)">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">待定价磅单</div>
			<a class="aui-pull-right aui-btn aui-btn-outlined j_refresh_btn">
				<span class="aui-iconfont iconfont">&#xe769;</span> 刷新
			</a>
		</header>
	</div>

	<div class="searchbox aui-bg-ff">
		<div class="search-name aui-row aui-padded-md aui-border-b">
			<div class="aui-col-xs-6"><input class="search-ipt" value="" placeholder="请输入磅单编号、供应商名" /></div>
			<div class="aui-col-xs-3 aui-text-center">
				<div class="aui-btn aui-btn-info search-action-btn j_scan_btn"><i class="iconfont aui-font-size-14">&#xe657;</i>扫码</div>
			</div>
			<div class="aui-col-xs-3 aui-text-right">
				<div class="aui-btn aui-btn-info search-action-btn j_search_btn"><i class="iconfont aui-font-size-14">&#xe633;</i>搜索</div>
			</div>
		</div>
		<div class="search-time aui-padded-md zz-div-box aui-border-b">
			<div class="search-time-md">日期：</div>
			<div class="zz-div-td1 timeipt-box"><input type="" name="" id="" value="" class="timeipt" /><i
					class="iconfont timeipt-icon">&#xe65b;</i></div>
			<div class="search-time-md">-</div>
			<div class="zz-div-td1 timeipt-box"><input type="" name="" id="" value="" class="timeipt" /><i
					class="iconfont timeipt-icon">&#xe65b;</i></div>
		</div>
	</div>

	<div style="height: 15px;" class="aui-border-b"></div>
	<div style="height: 2.2rem;">
		<div class="aui-tab" id="tab">
			<div class="aui-tab-item aui-active j_type" data-type="pending">未定价</div>
			<div class="aui-tab-item j_type" data-type="priced">已定价</div>
		</div>
	</div>

	<div class="list-box"></div>
	<div class="aui-text-center aui-padded-15 aui-text-999 nodata" style="display:none;">暂无相关数据</div>

	<script id="pendingTpl" type="text/html">
			<div class="aui-card-list aui-border-b">
				<div class="aui-card-list-header">
					<div>{{d.supplier_name || d.contact || ''}}</div>
					<div>未定价</div>
				</div>
				<div class="aui-card-list-content-padded aui-border-b aui-border-t zz-div-box aui-bg-default">
					<div class="column-cnt font_bold cpname">{{d.product_name || ''}}</div>
					<div class="zz-div-box zz-div-td1">
						<div class="zz-div-td1">
							<div><span class="aui-text-66">毛重：</span>{{d.gw || ''}}</div>
							<div><span class="aui-text-66">皮重：</span>{{d.tare || ''}}</div>
						</div>
						<div class="zz-div-td1">
							<div>&nbsp;</div>
							<div><span class="aui-text-66">净重：</span>{{d.nw || ''}}</div>
						</div>
					</div>
					<div class="column-cnt aui-text-center">
						<a href="pic.html?storage_self_id={{d.self_id || ''}}" class="aui-text-default"><i class="iconfont">&#xe67b;</i><br />查看</a>
					</div>
				</div>
				<div class="aui-card-list-content-padded aui-border-b zz-div-box aui-font-size-12">
					<div class="zz-div-td1 aui-text-99">{{d.company_name || ''}}<br />{{d.gmt_created || ''}}</div>
					<div class="zz-div-box cpmoery">
						<div class="cpmoery-danjia column-cnt">单价：<span class="aui-text-danger aui-font-size-14">{{d.price || ''}}</span></div>
						<div class="zz-div-td1 column-cnt">总额：<span class="aui-text-danger aui-font-size-14">{{d.total || ''}}</span></div>
					</div>
				</div>
				<div class="aui-card-list-footer">
					<div class="aui-text-99">磅单编号：{{d.iccode || ''}}</div>
					<div>
						<div class="aui-btn aui-btn-outlined j_del" data-id="{{d.id || ''}}">删除</div>&nbsp;&nbsp;&nbsp;&nbsp;
						<div class="aui-btn aui-btn-info j_djbtn" data-id="{{d.self_id || ''}}">定价</div>
					</div>
				</div>
			</div>
		</script>

	<script id="pricedTpl" type="text/html">
			<div class="aui-card-list aui-border-b">
				<div class="aui-card-list-header">
					<div>{{d.supplier_name || ''}}</div>
					<div>{{d.status || '已定价'}}</div>
				</div>
				<div class="aui-card-list-content-padded aui-border-b aui-border-t zz-div-box aui-bg-default">
					<div class="column-cnt font_bold cpname">{{d.product_name || ''}}</div>
					<div class="zz-div-box zz-div-td1">
						<div class="zz-div-td1">
							<div><span class="aui-text-66">毛重：</span>{{d.gw || ''}}</div>
							<div><span class="aui-text-66">皮重：</span>{{d.tare || d.tare_text || ''}}</div>
						</div>
						<div class="zz-div-td1">
							<div>&nbsp;</div>
							<div><span class="aui-text-66">净重：</span>{{d.nw || ''}}</div>
						</div>
					</div>
					<div class="column-cnt aui-text-center">
						<a href="pic.html?storage_self_id={{d.self_id || ''}}" class="aui-text-default"><i class="iconfont">&#xe67b;</i><br />查看</a>
					</div>
				</div>
				<div class="aui-card-list-content-padded aui-border-b zz-div-box aui-font-size-12">
					<div class="zz-div-td1 aui-text-99">{{d.company_name || ''}}<br />{{d.gmt_created || ''}}</div>
					<div class="zz-div-box cpmoery">
						<div class="cpmoery-danjia column-cnt">单价：<span class="aui-text-danger aui-font-size-14">{{d.price || ''}}</span></div>
						<div class="zz-div-td1 column-cnt">总额：<span class="aui-text-danger aui-font-size-14">{{d.total || ''}}</span></div>
					</div>
				</div>
				<div class="aui-card-list-footer">
					<div class="aui-text-99">磅单编号：{{d.iccode || ''}}</div>
					<div></div>
				</div>
			</div>
		</script>
</body>

</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var currentType = "pending";

	apiready = function () {
		changeserverurl();
		bindEvent();
		initDatePicker();
		getinfo();
	};

	function bindEvent() {
		$(".j_type").on("click", function () {
			$(".aui-active").removeClass("aui-active");
			$(this).addClass("aui-active");
			currentType = $(this).data("type");
			getinfo();
		});
		$(".j_search_btn, .j_refresh_btn").on("click", function () {
			getinfo();
		});
		$(".j_scan_btn").on("click", function () {
			openScan();
		});
	}

	function openScan() {
		if (!(window.api && api.require)) {
			hint("当前环境不支持扫码");
			return false;
		}
		var FNScanner = api.require("FNScanner");
		if (!FNScanner || !FNScanner.open) {
			hint("当前设备未安装扫码模块");
			return false;
		}
		FNScanner.open({
			autorotation: true
		}, function (ret, err) {
			if (err) {
				hint(err.msg || "扫码失败");
				return;
			}
			if (!ret) {
				return;
			}
			if (ret.eventType == "success" || ret.content) {
				var orderNo = $.trim(ret.content || ret.msg || "");
				if (!orderNo) {
					hint("未识别到订单号");
					return;
				}
				$(".search-ipt").val(orderNo);
				getinfo();
				if (FNScanner.closeView) {
					FNScanner.closeView();
				}
			} else if (ret.eventType == "cancel") {
				if (FNScanner.closeView) {
					FNScanner.closeView();
				}
			}
		});
	}

	function initDatePicker() {
		var currYear = (new Date()).getFullYear();
		$(".timeipt").mobiscroll({
			preset: 'date',
			theme: 'android-ics light',
			display: 'modal',
			mode: 'scroller',
			dateFormat: 'yy-mm-dd',
			setText: '确定',
			cancelText: '取消',
			dateOrder: 'yymmdd',
			yearText: '年',
			monthText: '月',
			dayText: '日',
			endYear: currYear + 2,
			lang: "zh",
			showNow: true,
			minDate: new Date(),
			nowText: '今天'
		});
	}

	function getinfo() {
		var keyword = $(".search-ipt").val();
		var data = {
			page: 1
		};
		if (keyword) {
			data.code = keyword;
			data.iccode = keyword;
			data.keyword = keyword;
		}
		if ($(".timeipt").eq(0).val()) {
			data.time_min = $(".timeipt").eq(0).val();
		}
		if ($(".timeipt").eq(1).val()) {
			data.time_max = $(".timeipt").eq(1).val();
		}
		if (currentType === "pending") {
			data.pricing = 1;
		} else {
			data.priced = 1;
		}
		zzappajax("get", hosturl + "app/pricing.html", data, function (ret) {
			if (ret && ret.hasOwnProperty("err") && ret.err == "true") {
				$(".list-box").html("");
				$(".nodata").show();
				hint(ret.errtext || "暂无相关数据");
				return false;
			}
			var list = ret.listall || [];
			var html = "";
			var tplId = currentType === "pending" ? "pendingTpl" : "pricedTpl";
			$.each(list, function (index, item) {
				var tpl = $api.html($api.byId(tplId));
				laytpl(tpl).render(item, function (rendered) {
					html += rendered;
				});
			});
			$(".list-box").html(html);
			$(".nodata").toggle(list.length === 0);
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			$(".list-box").html("");
			$(".nodata").show();
		});
	}
</script>
