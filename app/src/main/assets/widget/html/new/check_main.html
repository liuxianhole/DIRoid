<!doctype html>
<html>

<head>
	<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
	<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
	<meta content="telephone=no" name="format-detection" />
	<meta content="address=no" name="format-detection" />
	<meta name="apple-mobile-web-app-capable" content="no" />
	<link rel="apple-touch-icon-precomposed" href="../../image/logo.png" />
	<link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-precomposed" />
	<meta name="apple-touch-fullscreen" content="YES">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link rel="shortcut icon" href="../../image/favicon.ico" />
	<title>审核管理</title>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<script type="text/javascript" src="../../script/layer/layer.js"></script>
	<link href="../../css/mobiscroll.custom-2.6.2.min.css" rel="stylesheet"
		type="text/css" />
	<script src="../../script/mobiscroll.custom-2.6.2.min.js"
		type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
	<style>
		body {
			background: #f5f5f5;
		}

		.searchbox {
			background: #fff;
		}

		.tab-wrap {
			height: 2.2rem;
			background: #fff;
		}

		.aui-tab-item {
			font-size: 0.75rem;
		}
	</style>
</head>

<body>
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav aui-border-b">
			<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript:history.back(-1)">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">审核管理</div>
		</header>
	</div>

	<div class="searchbox aui-bg-ff">
		<div class="search-name aui-row aui-padded-md aui-border-b">
			<div class="aui-col-xs-9"><input class="search-ipt" value="" placeholder="请输入供应商名、单号" /></div>
			<div class="aui-col-xs-3 aui-text-right">
				<div class="aui-btn aui-btn-info j_search_btn"><i class="iconfont aui-font-size-14">&#xe633;</i>搜索</div>
			</div>
		</div>
		<div class="search-time aui-padded-md zz-div-box aui-border-b">
			<div class="search-time-md">日期：</div>
			<div class="zz-div-td1 timeipt-box"><input type="" name="" value="" class="timeipt" /><i
					class="iconfont timeipt-icon">&#xe65b;</i></div>
			<div class="search-time-md">-</div>
			<div class="zz-div-td1 timeipt-box"><input type="" name="" value="" class="timeipt" /><i
					class="iconfont timeipt-icon">&#xe65b;</i></div>
		</div>
	</div>

	<div style="height: 15px;" class="aui-border-b"></div>
	<div class="tab-wrap">
		<div class="aui-tab" id="tab">
			<div class="aui-tab-item aui-active j_type" data-index="0">未审核</div>
			<div class="aui-tab-item j_type" data-index="1">已审核未付</div>
			<div class="aui-tab-item j_type" data-index="2">已审核已付</div>
		</div>
	</div>
</body>

</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	apiready = function () {
		initDatePicker();
		openGroup();
		bindEvent();
	};

	function openGroup() {
		var headerHeight = $("header").outerHeight() || 0;
		var searchHeight = $(".searchbox").outerHeight() || 0;
		var topSpaceHeight = 15;
		var tabHeight = $(".tab-wrap").outerHeight() || 0;
		var iosstatusheight = getisostatusheight();
		api.openFrameGroup({
			preload: 1,
			name: 'check_group',
			rect: {
				x: 0,
				y: headerHeight + searchHeight + topSpaceHeight + tabHeight + iosstatusheight,
				w: 'auto',
				h: 'auto'
			},
			frames: [{
				name: 'nocheck',
				url: 'check.html',
				bgColor: '#f2f2f2'
			}, {
				name: 'checknopay',
				url: 'check_nopay.html',
				bgColor: '#f2f2f2'
			}, {
				name: 'checkpay',
				url: 'check_pay.html',
				bgColor: '#f2f2f2'
			}]
		}, function (ret, err) {
			if (ret) {
				switchTab(ret.index);
			}
		});
	}

	function bindEvent() {
		$(".j_search_btn").on("click", function () {
			return false;
		});
		$(".j_type").on("click", function () {
			var index = parseInt($(this).attr("data-index"), 10) || 0;
			switchTab(index);
			api.setFrameGroupIndex({
				name: 'check_group',
				index: index,
				scroll: true,
				showProgress: false
			});
		});
	}

	function switchTab(index) {
		$(".aui-tab-item").removeClass("aui-active");
		$(".j_type").eq(index).addClass("aui-active");
	}

	function initDatePicker() {
		var currYear = (new Date()).getFullYear();
		$(".timeipt").mobiscroll({
			preset: 'date',
			theme: 'android-ics light',
			display: 'modal',
			mode: 'scroller',
			dateFormat: 'yy-mm-dd',
			setText: '确定',
			cancelText: '取消',
			dateOrder: 'yymmdd',
			yearText: '年',
			monthText: '月',
			dayText: '日',
			endYear: currYear + 2,
			lang: "zh",
			showNow: true,
			minDate: new Date(),
			nowText: '今天'
		});
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
