<!doctype html>
<html>

<head>
	<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
	<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
	<meta content="telephone=no" name="format-detection" />
	<meta content="address=no" name="format-detection" />
	<meta name="apple-mobile-web-app-capable" content="no" />
	<link rel="apple-touch-icon-precomposed" href="../../image/logo.png" />
	<link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-precomposed" />
	<meta name="apple-touch-fullscreen" content="YES">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link rel="shortcut icon" href="../../image/favicon.ico" />
	<title>智慧农业收购管理系统</title>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<script type="text/javascript" src="../../script/layer/layer.js"></script>
	<link href="../../css/mobiscroll.custom-2.6.2.min.css" rel="stylesheet" type="text/css" />
	<script src="../../script/mobiscroll.custom-2.6.2.min.js" type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
	<style>
		.search-action-btn {
			width: 100%;
			padding: 0;
		}
	</style>
</head>

<body class="new-page-skin">
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav aui-border-b new-page-header">
			<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript :history.back(-1)">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">榜单审核</div>
			<a class="aui-pull-right aui-btn aui-btn-outlined j_refresh_btn">
				<span class="aui-iconfont iconfont">&#xe769;</span> 刷新
			</a>
		</header>
	</div>

	<div class="searchbox aui-bg-ff">
		<div class="search-name aui-row aui-padded-md aui-border-b">
			<div class="aui-col-xs-6"><input class="search-ipt" value="" placeholder="请输入供应商名" /></div>
			<div class="aui-col-xs-3 aui-text-center">
				<div class="aui-btn aui-btn-info search-action-btn j_scan_btn"><i
						class="iconfont aui-font-size-14">&#xe657;</i>扫码</div>
			</div>
			<div class="aui-col-xs-3 aui-text-right">
				<div class="aui-btn aui-btn-info search-action-btn j_search_btn"><i
						class="iconfont aui-font-size-14">&#xe633;</i>搜索</div>
			</div>
		</div>
		<div class="search-time aui-padded-md zz-div-box aui-border-b">
			<div class="search-time-md">日期：</div>
			<div class="zz-div-td1 timeipt-box"><input value="" class="timeipt" /><i
					class="iconfont timeipt-icon">&#xe65b;</i></div>
			<div class="search-time-md">-</div>
			<div class="zz-div-td1 timeipt-box"><input value="" class="timeipt" /><i
					class="iconfont timeipt-icon">&#xe65b;</i></div>
		</div>
	</div>

	<div style="height: 15px;" class="aui-border-b"></div>
	<div style="height: 2.2rem;">
		<div class="aui-tab" id="tab">
			<div class="aui-tab-item aui-active j_type" data-type="pending">待审核</div>
			<div class="aui-tab-item j_type" data-type="nopay">已审核未付</div>
			<div class="aui-tab-item j_type" data-type="pay">已审核已付</div>
		</div>
	</div>

	<div class="list-box"></div>
	<div class="aui-text-center aui-padded-15 aui-text-999 nodata" style="display:none;">暂无相关数据</div>

	<script id="itemTpl" type="text/html">
		<div class="aui-card-list aui-border-b">
			<div class="aui-card-list-header">
				<div>{{d.suppliers_name || ''}}</div>
				<div>{{d.audit_text || ''}}</div>
			</div>
			<div class="aui-card-list-content-padded aui-border-b aui-border-t zz-div-box aui-bg-default">
				<div class="column-cnt font_bold cpname">{{d.suppliers_name || ''}}</div>
				<div class="zz-div-box zz-div-td1">
					<div class="zz-div-td1">
						<div><span class="aui-text-66">过磅总净重：</span>{{d.storage_weight || ''}}</div>
						<div><span class="aui-text-66">总额：</span>{{d.total || ''}}</div>
					</div>
					<div class="zz-div-td1">
						<div>&nbsp;</div>
						<div><span class="aui-text-66">时间：</span>{{d.gmt_created || ''}}</div>
					</div>
				</div>
				<div class="column-cnt aui-text-center">
					<div class="aui-text-default">{{d.audit_text || ''}}</div>
				</div>
			</div>
			<div class="aui-card-list-footer">
				<div class="aui-text-99">供应商编号：{{d.suppliers_self_id || ''}}</div>
				<div>
					<div class="aui-btn aui-btn-info j_openbtn" data-sid="{{d.suppliers_self_id || ''}}">{{d.btn_text || '查看'}}</div>
				</div>
			</div>
		</div>
	</script>
</body>

</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var currentType = "pending";
	var page = 1;
	var pagecount = 1;
	var pageLimit = 20;
	var isLoading = false;
	var itemTplRender = null;
	var typeConfig = {
		pending: {
			url: "app/pricing_nocheck_suppliers.html",
			title: "待审核",
			btnText: "审核",
			isPay: 0,
			placeholder: "请输入供应商名"
		},
		nopay: {
			url: "app/pricing_check_nopay.html",
			title: "已审核未付",
			btnText: "查看",
			isPay: 3,
			placeholder: "请输入供应商名"
		},
		pay: {
			url: "app/pricing_check_pay.html",
			title: "已审核已付",
			btnText: "查看",
			isPay: 1,
			placeholder: "请输入供应商名"
		}
	};

	apiready = function () {
		changeserverurl();
		bindEvent();
		initDatePicker();
		getinfo(true);
		api.addEventListener({
			name: "scrolltobottom"
		}, function () {
			if (isLoading || page >= pagecount) {
				return false;
			}
			page += 1;
			getinfo(false);
		});
	};

	function bindEvent() {
		$(".j_type").on("click", function () {
			$(".aui-active").removeClass("aui-active");
			$(this).addClass("aui-active");
			currentType = ($(this).data("type") || "pending").toString();
			$(".search-ipt").attr("placeholder", typeConfig[currentType].placeholder);
			getinfo(true);
		});
		$(".j_search_btn").on("click", function () {
			if (tryOpenByOrderCode()) {
				return;
			}
			getinfo(true);
		});
		$(".j_refresh_btn").on("click", function () {
			getinfo(true);
		});
		$(".j_scan_btn").on("click", function () {
			openScan();
		});
		$(".list-box").on("click", ".j_openbtn", function () {
			var suppliersSelfId = $(this).attr("data-sid");
			openCheckWin(suppliersSelfId);
		});
		$(".timeipt").on("change", function () {
			getinfo(true);
		});
	}

	function openScan() {
		if (!(window.api && api.require)) {
			hint("当前环境不支持扫码");
			return false;
		}
		var FNScanner = api.require("FNScanner");
		if (!FNScanner || !FNScanner.open) {
			hint("当前设备未安装扫码模块");
			return false;
		}
		FNScanner.open({
			autorotation: true
		}, function (ret, err) {
			if (err) {
				hint(err.msg || "扫码失败");
				return;
			}
			if (!ret) {
				return;
			}
			if (ret.eventType == "success" || ret.content) {
				var code = $.trim(ret.content || ret.msg || "");
				if (!code) {
					hint("未识别到榜单编号");
					return;
				}
				$(".search-ipt").val(code);
				openOrderPage(code);
				if (FNScanner.closeView) {
					FNScanner.closeView();
				}
			} else if (ret.eventType == "cancel") {
				if (FNScanner.closeView) {
					FNScanner.closeView();
				}
			}
		});
	}

	function looksLikeOrderCode(keyword) {
		keyword = $.trim(keyword || "");
		return /^\d{10}$/.test(keyword) || /^BD\d{17}$/i.test(keyword);
	}

	function openOrderPage(code) {
		code = $.trim(code || "");
		if (!code) {
			hint("未识别到榜单编号");
			return false;
		}
		openWinNormal("bangdan_jiesuan", "widget://html/new/bangdan-jiesuan.html", {
			code: code,
			wintitle: "磅单结算"
		});
		return true;
	}

	function tryOpenByOrderCode() {
		var keyword = $.trim($(".search-ipt").val() || "");
		if (!looksLikeOrderCode(keyword)) {
			return false;
		}
		return openOrderPage(keyword);
	}

	function openCheckWin(suppliersSelfId) {
		if (!suppliersSelfId) {
			hint("未查询到供应商");
			return false;
		}
		var pageParam = {
			suppliers_self_id: suppliersSelfId,
			is_pay: typeConfig[currentType].isPay
		};
		openWinNormal("paycheck", "widget://html/new/check_win.html", pageParam);
	}

	function initDatePicker() {
		var currYear = (new Date()).getFullYear();
		$(".timeipt").mobiscroll({
			preset: "date",
			theme: "android-ics light",
			display: "modal",
			mode: "scroller",
			dateFormat: "yy-mm-dd",
			setText: "确定",
			cancelText: "取消",
			dateOrder: "yymmdd",
			yearText: "年",
			monthText: "月",
			dayText: "日",
			startYear: currYear - 5,
			endYear: currYear + 5,
			lang: "zh",
			showNow: true,
			nowText: "今天"
		});
	}

	function isInDateRange(item) {
		var day = ((item.gmt_created || "").split(" "))[0] || "";
		var timeMin = $.trim($(".timeipt").eq(0).val() || "");
		var timeMax = $.trim($(".timeipt").eq(1).val() || "");
		if (timeMin && day && day < timeMin) {
			return false;
		}
		if (timeMax && day && day > timeMax) {
			return false;
		}
		return true;
	}

	function formatMoney(value) {
		var num = parseFloat(value);
		if (isNaN(num)) {
			num = 0;
		}
		return num.toFixed(2);
	}

	function getPageCount(ret) {
		var count = parseInt(ret.page_listcount || ret.pagecount || ret.page_count || ret.total_page || 1, 10);
		return isNaN(count) || count < 1 ? 1 : count;
	}

	function getItemTplRender() {
		if (!itemTplRender) {
			itemTplRender = laytpl($api.html($api.byId("itemTpl")));
		}
		return itemTplRender;
	}

	function getinfo(reset) {
		if (isLoading) {
			return false;
		}
		if (reset !== false) {
			page = 1;
		}
		isLoading = true;
		var conf = typeConfig[currentType] || typeConfig.pending;
		var keyword = $.trim($(".search-ipt").val() || "");
		var timeMin = $.trim($(".timeipt").eq(0).val() || "");
		var timeMax = $.trim($(".timeipt").eq(1).val() || "");
		zzappajax("get", hosturl + conf.url, {
			page: page,
			limit: pageLimit,
			page_size: pageLimit,
			supplier_name: keyword,
			time_min: timeMin,
			time_max: timeMax,
			gmt_start: timeMin,
			gmt_end: timeMax
		}, function (ret) {
			isLoading = false;
			if (ret && ret.hasOwnProperty("err") && ret.err == "true") {
				if (page == 1) {
					$(".list-box").html("");
				}
				$(".nodata").show();
				hint(ret.errtext || "暂无相关数据");
				return false;
			}
			pagecount = getPageCount(ret || {});
			var list = $.grep(ret.listall || [], function (item) {
				var ok = isInDateRange(item);
				if (!ok) {
					return false;
				}
				if (!keyword) {
					return true;
				}
				var name = item.suppliers_name || "";
				return name.indexOf(keyword) > -1;
			});
			var html = "";
			var render = getItemTplRender();
			$.each(list, function (index, item) {
				item.audit_text = conf.title;
				item.btn_text = conf.btnText;
				item.total = formatMoney(item.total);
				render.render(item, function (rendered) {
					html += rendered;
				});
			});
			if (page == 1) {
				$(".list-box").html(html);
			} else {
				$(".list-box").append(html);
			}
			$(".nodata").toggle(page == 1 && list.length === 0);
		}, function (err) {
			isLoading = false;
			if (err) {
				saveerrlog(err.body);
			}
			if (page == 1) {
				$(".list-box").html("");
				$(".nodata").show();
			}
		});
	}
</script>
