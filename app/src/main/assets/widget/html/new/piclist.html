<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport"
		content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />
	<meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
	<title>现场照片</title>
	<link rel="stylesheet" type="text/css" href="../../css/aui2.1.css">
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
	<style>
		body {
			background: #f5f5f5;
		}

		.picmain {
			padding: 0.5rem 0.6rem 0.9rem;
		}

		.pic-card {
			background: #fff;
			border-radius: 0.35rem;
			overflow: hidden;
			margin-bottom: 0.65rem;
			box-shadow: 0 0.08rem 0.35rem rgba(0, 0, 0, 0.05);
		}

		.pic-card-head {
			padding: 0.55rem 0.65rem;
			color: #666;
			font-size: 0.65rem;
			border-bottom: 1px solid #f0f0f0;
		}

		.pic-card-body {
			background: #fff;
			text-align: center;
		}

		.pic-card-body img {
			display: block;
			width: 100%;
			min-height: 8rem;
			background: #f7f7f7;
		}

		.empty-box {
			display: none;
			padding: 2rem 0.75rem;
			text-align: center;
			color: #999;
			font-size: 0.7rem;
		}
	</style>
</head>

<body class="new-page-skin">
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav aui-border-b new-page-header">
			<a class="aui-pull-left" href="javascript:void(0)" onclick="closePage()">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">现场照片</div>
		</header>
	</div>

	<div class="picmain"></div>
	<div class="empty-box">暂无现场照片</div>

	<script id="piclist" type="text/html">
		<div class="pic-card">
			<div class="pic-card-head">{{d.gmt_created || ''}}</div>
			<div class="pic-card-body">
				<img src="{{d.pic || ''}}" alt="现场照片" />
			</div>
		</div>
	</script>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>

<script type="text/javascript">
	apiready = function () {
		changeserverurl();
		loadingshow();
		ajainfo();
	};

	function closePage() {
		if (window.api && api.closeWin) {
			api.closeWin();
			return;
		}
		history.back(-1);
	}

	function ajainfo() {
		var data = {
			storage_self_id: api.pageParam.storage_self_id
		};
		zzappajax("get", hosturl + "app/pic.html", data, function (ret) {
			var list = ret || [];
			var pageHtml = "";
			$.each(list, function (index, item) {
				var getTpl = $api.html($api.byId("piclist"));
				laytpl(getTpl).render(item, function (html) {
					pageHtml = pageHtml + html;
				});
			});
			$(".picmain").html(pageHtml);
			$(".empty-box").toggle(list.length === 0);
			loadinghide();
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			$(".picmain").html("");
			$(".empty-box").show();
			api.hideProgress();
			return false;
		});
	}
</script>

</html>
