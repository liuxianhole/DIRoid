<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport"
		content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />
	<meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
	<title>微信支付</title>
	<link rel="stylesheet" type="text/css" href="../../css/aui2.1.css">
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
	<style>
		body {
			background: #f4f7fb;
		}

		.pay-card {
			margin: 0.75rem;
			padding: 1rem 0.9rem;
			background: #fff;
			border-radius: 0.4rem;
			box-shadow: 0 0.15rem 0.6rem rgba(43, 108, 176, 0.06);
		}

		.pay-title {
			font-size: 0.92rem;
			font-weight: 700;
			color: #1f2937;
			text-align: center;
			margin-bottom: 0.9rem;
		}

		.pay-line {
			font-size: 0.76rem;
			color: #475569;
			line-height: 1.4rem;
		}

		.pay-amount {
			font-size: 1.3rem;
			font-weight: 700;
			color: #16a34a;
			text-align: center;
			margin: 0.7rem 0 0.9rem;
		}

		.pay-tip {
			font-size: 0.68rem;
			color: #94a3b8;
			text-align: center;
			line-height: 1rem;
		}
	</style>
</head>

<body class="new-page-skin">
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav aui-border-b new-page-header">
			<a class="aui-pull-left" href="javascript:void(0)" onclick="api.closeWin();">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">微信支付</div>
		</header>
	</div>

	<div class="pay-card">
		<div class="pay-title">微信支付页面</div>
		<div class="pay-line">订单号：<span class="j_order_no"></span></div>
		<div class="pay-line">支付方式：微信支付</div>
		<div class="pay-amount">￥<span class="j_total"></span></div>
		<div class="pay-tip">当前页面用于承接微信支付跳转。<br />后续可继续接入真实微信支付能力。</div>
	</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	apiready = function () {
		changeserverurl();
		$(".j_order_no").text((api.pageParam && (api.pageParam.orderNo || api.pageParam.code)) || "");
		$(".j_total").text((api.pageParam && api.pageParam.total) || "0.00");
	};
</script>

</html>
