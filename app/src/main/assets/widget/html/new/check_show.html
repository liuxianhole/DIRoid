<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>付款审核</title>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css">
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<link rel="stylesheet" type="text/css" href="../../css/common.css" />
	<link rel="stylesheet" type="text/css" href="../../css/index.css" />
	<style>
		html,
		body {
			background: #f5f5f5;
		}

		.bdlist-box {
			padding-bottom: 0.5rem;
		}

		.edit-total {
			display: inline-flex;
			align-items: center;
			gap: 0.2rem;
			color: #e54d42;
			font-weight: bold;
		}

		.edit-total img {
			width: 0.7rem;
			height: 0.7rem;
		}

		.nodata,
		.la_more {
			text-align: center;
			color: #999;
			padding: 0.75rem 0;
		}
	</style>
</head>

<body class="new-page-skin">
	<div class="bdlist-box">
		<div class="aui-toast" id="loading">
			<div class="aui-toast-loading"></div>
			<div class="aui-toast-content">加载中</div>
		</div>
	</div>

	<script id="bdlist" type="text/html">
		<div class="aui-card-list aui-border-b">
			<div class="aui-card-list-header">
				<div>{{d.supplier_name || ''}}</div>
				<div class="aui-font-size-12 aui-text-66">（{{d.status || ''}}）{{d.stype || ''}} {{d.is_pay || ''}}</div>
			</div>
			<div class="aui-card-list-content-padded aui-border-b aui-border-t zz-div-box aui-bg-default">
				<div class="column-cnt font_bold cpname">{{d.product_name || ''}}</div>
				<div class="zz-div-box zz-div-td1">
					<div class="zz-div-td1">
						<div><span class="aui-text-66">毛重：</span>{{d.gw || ''}}</div>
						<div><span class="aui-text-66">皮重：</span>{{d.tare || ''}}</div>
					</div>
					<div class="zz-div-td1">
						<div><span class="aui-text-66">扣杂：</span>{{d.clasp || ''}}</div>
						<div><span class="aui-text-66">净重：</span>{{d.nw || ''}}</div>
					</div>
				</div>
				<div class="column-cnt aui-text-center">
					<div class="aui-text-default pic" sid="{{d.id}}" storage_self_id="{{d.self_id}}">
						{{# if (d.piclist!=""){ }}
						<i class="iconfont">&#xe67b;</i><br />查看
						{{# }else{ }}
						<i class="iconfont aui-text-999">&#xe67b;</i><br />暂无
						{{# } }}
					</div>
				</div>
			</div>
			<div class="aui-card-list-content-padded aui-border-b zz-div-box aui-font-size-12">
				<div class="zz-div-td1 aui-text-99">{{d.company_name || ''}}<br />{{d.gmt_created || ''}}</div>
				<div class="zz-div-box cpmoery">
					<div class="cpmoery-danjia column-cnt">单价：<span class="aui-text-danger aui-font-size-14">{{d.price || ''}}</span></div>
					<div class="zz-div-td1 column-cnt">支付：
						<span class="edit-total edittotal" sid="{{d.id}}">
							<font>{{d.total || ''}}</font>
							<img src="../../image/edit.png" />
						</span>
					</div>
				</div>
			</div>
			<div class="aui-card-list-footer">
				<div class="aui-text-99">榜单编号：{{d.code || d.ic_code || ''}}</div>
				<div class="aui-text-66">{{d.gmt_created || ''}}</div>
			</div>
		</div>
	</script>

	<div class="nodata" style="display:none;">暂无待审核磅单</div>
	<div class="la_more">上拉获取更多信息</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var page = 1;
	var pagecount = 0;
	var bdinfo = [];
	var ic_code = "";
	var sid = 0;
	apiready = function () {
		changeserverurl();
		getinfo();
		api.addEventListener({
			name: "scrolltobottom"
		}, function (ret, err) {
			if (page >= pagecount) {
				$(".la_more").html("全部加载完毕");
				return false;
			}
			$(".la_more").html("加载更多中...");
			setTimeout(function () {
				page += 1;
				getinfo();
			}, 10);
		});

		api.setRefreshHeaderInfo({
			visible: true,
			bgColor: "#E6E6E6",
			textColor: "#000000",
			textDown: "下拉刷新",
			textUp: "释放刷新"
		}, function (ret, err) {
			ic_code = "";
			page = 1;
			getinfo();
			api.toast({
				msg: "数据已是最新！",
				duration: 3000,
				location: "bottom"
			});
		});

		$(".bdlist-box").on("click", ".pic", function () {
			var pageParam = {
				wintitle: "现场照片",
				type: "piclist",
				bounces: false,
				storage_self_id: $(this).attr("storage_self_id")
			};
			openWin("piclist", "../new/piclist.html", pageParam);
		});
		$(".bdlist-box").on("click", ".edittotal", function () {
			var sid = $(this).attr("sid");
			var total = $(this).find("font").text();
			layer.prompt({
				title: "修改总价",
				value: total
			}, function (val, index) {
				var isnumflag = isNaN(val);
				if (isnumflag) {
					layer.msg("必须是数字！");
					return false;
				}
				var data = {
					id: sid,
					total: val
				};
				layer.load(2);
				zzappajax("post", hosturl + "app/realtotal_save.html", data, function (ret) {
					if (ret.err == "false") {
						layer.msg("修改成功！");
						getinfo();
					} else {
						layer.msg(ret.errtext);
					}
					layer.closeAll("loading");
				}, function (err) {
					layer.closeAll("loading");
				});
				layer.close(index);
			});
		});
	};

	function nopaysh() {
		var data = {
			is_pay: 1,
			suppliers_self_id: api.pageParam.suppliers_self_id
		};
		zzappajax("post", hosturl + "app/storage_pay.html", data, function (ret) {
			if (ret.err == "false") {
				var suc = layer.msg("审核成功！");
				if (suc) {
					api.execScript({
						name: "j_check",
						frameName: "checknopay",
						script: "getinfo()"
					});
					api.closeWin({});
				}
			}
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	}

	function nopaycheck() {
		var data = {
			is_pay: 3,
			suppliers_self_id: api.pageParam.suppliers_self_id
		};
		zzappajax("post", hosturl + "app/storage_check.html", data, function (ret) {
			if (ret.err == "false") {
				var suc = layer.msg("审核成功！");
				if (suc) {
					api.execScript({
						name: "j_check",
						frameName: "nocheck",
						script: "getinfo()"
					});
					api.closeWin({});
				}
			}
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	}

	function paycheck() {
		var data = {
			is_pay: 1,
			suppliers_self_id: api.pageParam.suppliers_self_id
		};
		zzappajax("post", hosturl + "app/storage_check.html", data, function (ret) {
			if (ret.err == "false") {
				layer.msg("审核成功！");
				api.execScript({
					name: "j_check",
					frameName: "nocheck",
					script: "getinfo()"
				});
				api.closeWin({});
			}
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	}

	var getinfo = function () {
		var data = {
			suppliers_self_id: api.pageParam.suppliers_self_id,
			is_pay: api.pageParam.is_pay,
			jiesuan: 1,
			page: page
		};
		zzappajax("post", hosturl + "app/storage.html", data, function (ret) {
			if (ret.hasOwnProperty("err")) {
				if (ret.err == "true") {
					layer.msg(ret.errtext);
					api.hideProgress();
					api.refreshHeaderLoadDone();
					loadinghide();
					return false;
				}
			}
			var pageHtml_dj = "";
			$.each(ret.listall, function (index, item) {
				var getTpl = $api.html($api.byId("bdlist"));
				laytpl(getTpl).render(item, function (html) {
					pageHtml_dj = pageHtml_dj + html;
				});
			});

			if (page == 1) {
				bdinfo = [];
				pagecount = ret.page_listcount;
				if (pageHtml_dj == "") {
					$(".nodata").show();
					$(".la_more").hide();
				} else {
					$(".nodata").hide();
					$(".la_more").show();
				}
				$(".bdlist-box").html(pageHtml_dj);
			} else {
				$(".bdlist-box").append(pageHtml_dj);
			}
			api.execScript({
				name: "paycheck",
				script: "gettotal('" + ret.total_price + "')"
			});
			api.toast({
				msg: page + "/" + pagecount + "页",
				duration: 2000,
				location: "bottom"
			});
			loadinghide();
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	};
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>

</html>
