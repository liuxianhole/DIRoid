<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>已审核未付</title>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css">
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<link rel="stylesheet" type="text/css" href="../../css/common.css" />
	<style>
		html,
		body {
			background: #f2f2f2;
		}
	</style>
</head>

<body class="new-page-skin">
	<div class="list-box"></div>
	<div class="aui-text-center aui-padded-15 aui-text-999 nodata" style="display:none;">暂无已审核未付订单</div>

	<script id="itemTpl" type="text/html">
		<div class="aui-card-list aui-border-b">
			<div class="aui-card-list-header">
				<div>{{d.supplier_name || d.contact || ''}}</div>
				<div>已审核未付</div>
			</div>
			<div class="aui-card-list-content-padded aui-border-b aui-border-t zz-div-box aui-bg-default">
				<div class="column-cnt font_bold cpname">{{d.product_name || ''}}</div>
				<div class="zz-div-box zz-div-td1">
					<div class="zz-div-td1">
						<div><span class="aui-text-66">毛重：</span>{{d.gw || ''}}</div>
						<div><span class="aui-text-66">皮重：</span>{{d.tare || ''}}</div>
					</div>
					<div class="zz-div-td1">
						<div><span class="aui-text-66">扣杂：</span>{{d.clasp || ''}}</div>
						<div><span class="aui-text-66">净重：</span>{{d.nw || ''}}</div>
					</div>
				</div>
				<div class="column-cnt aui-text-center">
					<a href="pic.html?storage_self_id={{d.self_id || ''}}" class="aui-text-default"><i class="iconfont">&#xe67b;</i><br />查看</a>
				</div>
			</div>
			<div class="aui-card-list-content-padded aui-border-b zz-div-box aui-font-size-12">
				<div class="zz-div-td1 aui-text-99">{{d.company_name || ''}}<br />{{d.gmt_created || ''}}</div>
				<div class="zz-div-box cpmoery">
					<div class="cpmoery-danjia column-cnt">单价：<span class="aui-text-danger aui-font-size-14">{{d.price || ''}}</span></div>
					<div class="zz-div-td1 column-cnt">总额：<span class="aui-text-danger aui-font-size-14">{{d.total || ''}}</span></div>
				</div>
			</div>
			<div class="aui-card-list-footer">
				<div class="aui-text-99">榜单编号：{{d.code || d.ic_code || ''}}</div>
				<div><div class="aui-btn aui-btn-info j_settle_btn" data-code="{{d.code || d.ic_code || ''}}">结算</div></div>
			</div>
		</div>
	</script>
</body>

<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var keyword = "";
	var timeMin = "";
	var timeMax = "";
	var isPayValue = 3;
	var pageLimit = 20;
	var itemTplRender = null;

	apiready = function () {
		changeserverurl();
		bindEvent();
		getinfo();
		api.setRefreshHeaderInfo({
			visible: true,
			bgColor: "#E6E6E6",
			textColor: "#000000",
			textDown: "下拉刷新",
			textUp: "释放刷新"
		}, function () {
			getinfo();
			api.toast({
				msg: "数据已是最新！",
				duration: 3000,
				location: "bottom"
			});
		});
	};

	function bindEvent() {
		$(".list-box").on("click", ".j_settle_btn", function () {
			var code = $.trim($(this).attr("data-code") || "");
			if (!code) {
				hint("未查询到榜单编号");
				return false;
			}
			openWin("bangdan_jiesuan", "bangdan-jiesuan.html", {
				code: code,
				url: "../new/bangdan-jiesuan.html",
				wintitle: "磅单结算",
				bounces: false
			});
		});
	}

	function setFilterData(newKeyword, newTimeMin, newTimeMax) {
		keyword = $.trim(newKeyword || "");
		timeMin = $.trim(newTimeMin || "");
		timeMax = $.trim(newTimeMax || "");
		getinfo();
	}

	function isInDateRange(item) {
		var day = ((item.gmt_created || "").split(" "))[0] || "";
		if (timeMin && day && day < timeMin) {
			return false;
		}
		if (timeMax && day && day > timeMax) {
			return false;
		}
		return true;
	}

	function getinfo() {
		var data = {
			page: 1,
			limit: pageLimit,
			page_size: pageLimit,
			priced: 1,
			tare_check: 1,
			is_pay: isPayValue
		};
		if (keyword) {
			data.ic_code = keyword;
		}
		if (timeMin) {
			data.gmt_start = timeMin;
		}
		if (timeMax) {
			data.gmt_end = timeMax;
		}
		zzappajax("get", hosturl + "app/pricing.html", data, function (ret) {
			if (ret && ret.hasOwnProperty("err") && ret.err == "true") {
				$(".list-box").html("");
				$(".nodata").show();
				return false;
			}
			var list = $.grep(ret.listall || [], function (item) {
				var itemIsPay = (item.is_pay || "").toString();
				var tareCheck = (item.tare_check || "").toString();
				return tareCheck == "1" && itemIsPay == String(isPayValue) && isInDateRange(item);
			});
			var html = "";
			if (!itemTplRender) {
				itemTplRender = laytpl($api.html($api.byId("itemTpl")));
			}
			$.each(list, function (index, item) {
				itemTplRender.render(item, function (rendered) {
					html += rendered;
				});
			});
			$(".list-box").html(html);
			$(".nodata").toggle(list.length === 0);
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			$(".list-box").html("");
			$(".nodata").show();
		});
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>

</html>
