<script type="text/javascript">
	var sid = 0;
	var BADGE_COUNT_KEY = "new_index_bd_num";
	var USER_QX_CACHE_KEY = "new_index_user_qx";
	var USER_UTYPE_CACHE_KEY = "new_index_user_utype";
	var MENU_SELECTOR = ".j_kaidan,.j_scan,.j_buodan,.j_fukuan,.j_huizong,.j_mingxi,.j_gongying,.j_fenzhan,.j_chanping,.j_renyuan,.j_dibang_admin,.j_print";

	apiready = function () {
		if (!UserInfo.has_login()) {
			redirectToLogin();
			return;
		}
		changeserverurl();
		bindEvent();
		restoreBadgeCount();
		restoreMenuState();
		refreshHomeData();
		getsocketbandang();
	};

	function bindEvent() {
		api.setRefreshHeaderInfo({
			visible: true,
			bgColor: '#E6E6E6',
			textColor: '#000000',
			textDown: '下拉刷新',
			textUp: '释放刷新',
		}, function () {
			refreshHomeData();
			api.toast({
				msg: '数据已是最新！',
				duration: 3000,
				location: 'bottom'
			});
		});
		api.addEventListener({
			name: 'viewappear'
		}, function () {
			refreshHomeData();
		});
		api.addEventListener({
			name: 'resume'
		}, function () {
			refreshHomeData();
		});
		window.addEventListener("pageshow", function () {
			restoreBadgeCount();
			refreshHomeData();
		});
		document.addEventListener("visibilitychange", function () {
			if (!document.hidden) {
				restoreBadgeCount();
				refreshHomeData();
			}
		});
	}

	function refreshHomeData() {
		getProfile();
		getinfo();
		getuserqx();
	}

	function redirectToLogin() {
		api.execScript({
			name: "root",
			script: "reloadapp();"
		});
		window.setTimeout(function () {
			if (window.location.href.indexOf("index.html") > -1) {
				window.location.replace("login.html");
			}
		}, 300);
	}

	function setBadgeCount(count) {
		var value = parseInt(count, 10) || 0;
		if (value > 0) {
			$(".bd_num").html(value).show();
		} else {
			$(".bd_num").hide();
		}
		localStorage.setItem(BADGE_COUNT_KEY, value);
	}

	function restoreBadgeCount() {
		setBadgeCount(localStorage.getItem(BADGE_COUNT_KEY) || 0);
	}

	function safeRefreshHeaderDone() {
		if (window.api && api.refreshHeaderLoadDone) {
			api.refreshHeaderLoadDone();
		}
	}

	function getProfile() {
		zzappajax("post", hosturl + "app/myinfo.html", {}, function (ret) {
			$(".profile-name").text(ret.username || UserInfo.username() || "");
		}, function () {
			$(".profile-name").text(UserInfo.username() || "");
		});
	}

	function isValidQxList(ret) {
		return ret && typeof ret.indexOf == "function" && ret.length > 0 && !ret.hasOwnProperty("tokenerr");
	}

	function applyUserQx(ret) {
		if (!isValidQxList(ret)) {
			return false;
		}
		$(MENU_SELECTOR).show();
		if (ret.indexOf("price") < 0) {
			$(".j_kaidan").hide();
			$(".j_scan").hide();
		}
		if (ret.indexOf("price_bd") < 0) {
			$(".j_buodan").hide();
		}
		if (ret.indexOf("price_sh") < 0) {
			$(".j_fukuan").hide();
		}
		if (ret.indexOf("tong_ji_all") < 0) {
			$(".j_huizong").hide();
		}
		if (ret.indexOf("tong_ji_ming_xi") < 0) {
			$(".j_mingxi").hide();
		}
		if (ret.indexOf("gong_yin_shang") < 0) {
			$(".j_gongying").hide();
		}
		if (ret.indexOf("feng_zhan") < 0) {
			$(".j_fenzhan").hide();
		}
		if (ret.indexOf("products") < 0) {
			$(".j_chanping").hide();
		}
		if (ret.indexOf("users") < 0) {
			$(".j_renyuan").hide();
		}
		return true;
	}

	function applyUserType(utype) {
		if (utype == "1") {
			$(".j_fenzhan").show();
		}
		if (utype == "1" || utype == "4") {
			$(".j_renyuan").show();
		}
	}

	function restoreMenuState() {
		var cachedQx = localStorage.getItem(USER_QX_CACHE_KEY);
		var cachedUtype = localStorage.getItem(USER_UTYPE_CACHE_KEY);
		if (!cachedQx) {
			$(MENU_SELECTOR).show();
			return;
		}
		try {
			applyUserQx(JSON.parse(cachedQx));
			applyUserType(cachedUtype);
		} catch (e) {
			localStorage.removeItem(USER_QX_CACHE_KEY);
			$(MENU_SELECTOR).show();
		}
	}

	function getuserqx() {
		zzappajax("post", hosturl + "app/getuser_qx.html", '', function (ret) {
			if (ret && ret.hasOwnProperty("tokenerr")) {
				restoreMenuState();
				safeRefreshHeaderDone();
				return false;
			}
			if (applyUserQx(ret)) {
				localStorage.setItem(USER_QX_CACHE_KEY, JSON.stringify(ret));
			} else {
				restoreMenuState();
			}
			safeRefreshHeaderDone();
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			api.hideProgress();
			restoreMenuState();
			safeRefreshHeaderDone();
			return false;
		});
	}

	function getinfo() {
		zzappajax("post", hosturl + "app/get_num.html", '', function (ret) {
			var utype = ret.utype;
			setBadgeCount(ret.count);
			if (utype) {
				localStorage.setItem(USER_UTYPE_CACHE_KEY, utype);
				applyUserType(utype);
			}
			safeRefreshHeaderDone();
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			api.hideProgress();
			applyUserType(localStorage.getItem(USER_UTYPE_CACHE_KEY));
			safeRefreshHeaderDone();
			return false;
		});
	}

	function getsocketbandang() {
		var socketManager = api.require('socketManager');
		socketManager.createSocket({
			host: '101.37.14.79',
			port: 6969
		}, function (ret) {
			if (ret) {
				sid = ret.sid;
				if (ret.state == 103 && ret.data == "storageinsert") {
					getinfo();
				}
				if (ret.state == 102) {
					writesocketbandang();
				}
				if (ret.state == 204) {
					getsocketbandang();
				}
			} else {
				getsocketbandang();
			}
		});
	}

	function writesocketbandang() {
		var socketManager = api.require('socketManager');
		socketManager.write({
			sid: sid,
			data: '{"sendvalue":"updatestorage","company_id":' + UserInfo.memberID() + '}|'
		}, function () { });
	}
</script>
