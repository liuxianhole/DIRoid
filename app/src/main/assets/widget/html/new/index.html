<script type="text/javascript">
	var sid = 0;

	apiready = function () {
		if (!UserInfo.has_login()) {
			api.execScript({
				name: "root",
				script: "reloadapp();"
			});
			window.location.href = "login.html";
			return;
		}
		changeserverurl();
		bindEvent();
		getProfile();
		getinfo();
		getuserqx();
		getsocketbandang();
	};

	function bindEvent() {
		api.setRefreshHeaderInfo({
			visible: true,
			bgColor: '#E6E6E6',
			textColor: '#000000',
			textDown: '下拉刷新',
			textUp: '释放刷新',
		}, function () {
			getinfo();
			getuserqx();
			api.toast({
				msg: '数据已是最新！',
				duration: 3000,
				location: 'bottom'
			});
		});
	}

	function getProfile() {
		zzappajax("post", hosturl + "app/myinfo.html", {}, function (ret) {
			$(".profile-name").text(ret.contact || ret.mobile || "");
		}, function () {
			$(".profile-name").text("");
		});
	}

	function getuserqx() {
		zzappajax("post", hosturl + "app/getuser_qx.html", '', function (ret) {
			$(".j_bangdan,.j_huizong,.j_mingxi,.j_gongying,.j_fenzhan,.j_chanping,.j_renyuan,.j_baojia").show();
			if (ret.hasOwnProperty("tokenerr")) {
				return false;
			}
			if (ret) {
				if (ret.indexOf("price") < 0) {
					$(".j_bangdan").hide();
				}
				if (ret.indexOf("tong_ji_all") < 0) {
					$(".j_huizong").hide();
				}
				if (ret.indexOf("tong_ji_ming_xi") < 0) {
					$(".j_mingxi").hide();
				}
				if (ret.indexOf("gong_yin_shang") < 0) {
					$(".j_gongying").hide();
				}
				if (ret.indexOf("feng_zhan") < 0) {
					$(".j_fenzhan").hide();
				}
				if (ret.indexOf("products") < 0) {
					$(".j_chanping").hide();
				}
				if (ret.indexOf("users") < 0) {
					$(".j_renyuan").hide();
				}
			}
			api.refreshHeaderLoadDone();
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	}

	function getinfo() {
		zzappajax("post", hosturl + "app/get_num.html", '', function (ret) {
			var utype = ret.utype;
			if (parseInt(ret.count) > 0) {
				$(".bd_num").html(ret.count).show();
			} else {
				$(".bd_num").hide();
			}
			if (utype == "1") {
				$(".j_fenzhan").show();
			}
			if (utype == "1" || utype == "4") {
				$(".j_renyuan").show();
			}
			api.refreshHeaderLoadDone();
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	}

	function getsocketbandang() {
		var socketManager = api.require('socketManager');
		socketManager.createSocket({
			host: '101.37.14.79',
			port: 6969
		}, function (ret) {
			if (ret) {
				sid = ret.sid;
				if (ret.state == 103 && ret.data == "storageinsert") {
					getinfo();
				}
				if (ret.state == 102) {
					writesocketbandang();
				}
				if (ret.state == 204) {
					getsocketbandang();
				}
			} else {
				getsocketbandang();
			}
		});
	}

	function writesocketbandang() {
		var socketManager = api.require('socketManager');
		socketManager.write({
			sid: sid,
			data: '{"sendvalue":"updatestorage","company_id":' + UserInfo.memberID() + '}|'
		}, function () { });
	}
</script>
