<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport"
		content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />
	<meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
	<title>title</title>
	<link rel="stylesheet" type="text/css" href="../../css/aui2.1.css">
	<style>
		body {}

		.scale-status {
			margin-top: 0.3rem;
			font-size: 0.6rem;
			color: #666;
		}

		.qr-box {
			padding: 0.75rem 0;
			text-align: center;
			background: #fff;
			margin-bottom: 0.5rem;
		}

		.order-code {
			font-size: 0.8rem;
			font-weight: bold;
			color: #333;
			margin-top: 0.25rem;
		}

		.qrcode-wrap {
			width: 180px;
			height: 180px;
			margin: 0.5rem auto 0;
		}

		.qrcode-wrap canvas,
		.qrcode-wrap table {
			margin: 0 auto;
		}

		.percent-input-wrap {
			position: relative;
		}

		.percent-input-wrap input {
			padding-right: 1.2rem;
		}

		.percent-suffix {
			position: absolute;
			right: 0.35rem;
			top: 50%;
			transform: translateY(-50%);
			color: #666;
			font-size: 0.75rem;
		}

		.inline-input-wrap {
			display: flex;
			align-items: center;
			gap: 0.4rem;
		}

		.inline-input-wrap input {
			flex: 1;
		}

		.inline-scan-btn {
			flex: 0 0 auto;
			height: 1.8rem;
			line-height: 1.8rem;
			padding: 0 0.6rem;
			border-radius: 0.2rem;
		}
	</style>
</head>

<body>
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav aui-border-b">
			<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript:history.back(-1)">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">新增磅单</div>
		</header>
	</div>
	<div class="qr-box">
		<div>单号</div>
		<div class="order-code" id="order_code_text"></div>
		<div class="qrcode-wrap" id="order_qrcode"></div>
		<input type="hidden" id="order_code" value="">
	</div>
	<div class="aui-content aui-margin-b-15">
		<ul class="aui-list aui-form-list">
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">
						产品名称
					</div>
					<div class="aui-list-item-input">
						<select id="proself_id" class="products_self_id">
							<option value="">请选择产品名称</option>
						</select>
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">
						供应商
					</div>
					<div class="aui-list-item-input">
						<select class="suppliers_self_id">
						</select>
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">
						用户类型
					</div>
					<div class="aui-list-item-input">
						<select class="customer_type">
							<option value="normal" selected>普通用户</option>
							<option value="sznm">数农码用户</option>
						</select>
					</div>
				</div>
			</li>
			<li class="aui-list-item sznm_code_box" style="display:none;">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">
						数农码编号
					</div>
					<div class="aui-list-item-input">
						<div class="inline-input-wrap">
							<input type="text" class="sznm_code" placeholder="请扫码输入数农码用户编号">
							<div class="aui-btn aui-btn-info inline-scan-btn j_sznm_scan_btn"><i class="iconfont">&#xe657;</i>扫码</div>
						</div>
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">
						毛重
					</div>
					<div class="aui-list-item-input">
						<input type="number" class="gw" placeholder="请输入毛重">
						<div class="scale-status" id="scale_status">正在连接地磅读数...</div>
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">
						扣杂
					</div>
					<div class="aui-list-item-input">
						<input type="number" class="clasp" placeholder="" value="0">
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">
						扣点
					</div>
					<div class="aui-list-item-input">
						<div class="percent-input-wrap">
							<input type="number" class="point" placeholder="请输入扣点" value="0" min="0" max="100">
							<span class="percent-suffix">%</span>
						</div>
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">
						单价
					</div>
					<div class="aui-list-item-input">
						<input type="number" class="price" placeholder="输入单价">
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner aui-list-item-center aui-list-item-btn">
					<div class="aui-btn aui-btn-info aui-margin-r-15 j_btn">保存/打印</div>
					<div class="aui-btn aui-btn-danger aui-margin-l-15 close-pop">取消</div>
				</div>
			</li>
		</ul>
	</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript" src="../../script/qrcode.js"></script>
<script type="text/javascript" src="../../script/jquery.qrcode.js"></script>
<script type="text/javascript">
	var MAGIC_NUM = 0x494154;
	var ws = null;
	var uart = "";
	var di_bang_ip = "";
	var time_id = null;
	var orderCode = "";
	var LAST_PRODUCT_KEY = "new_bangdan_add_last_product";
	var tare_check = 1;

	apiready = function () {
		changeserverurl();
		ajaxinfo();
		initOrderCode();
		initDiBangConfig();
		get_di_bang_weight();
		window.setInterval(read_di_bang_weight, 1000);
		$(".close-pop").on("click", function () {
			api.closeWin({
			});;
		})
		$("#proself_id").on("change", function () {
			var self_id = $(this).val();
			var name = $(this).find("option:selected").text();
			if (self_id) {
				saveLastSelectedProduct(self_id, name);
			}
		});
		$(".customer_type").on("change", function () {
			toggleCustomerType();
		});
		$(".j_sznm_scan_btn").on("click", function () {
			openSznmScan();
		});
		toggleCustomerType();

		var canbtn = true;
		//确定提交
		$(".j_btn").on("click", function () {
			if (!canbtn) {
				return;
			}
			if ($("#proself_id").val() == "") {
				layer.msg("请选择产品名称！");
				return false;
			}
			if ($(".suppliers_self_id").val() == "") {
				layer.msg("请选择供应商！");
				return false;
			}
			if ($(".gw").val() == "") {
				layer.msg("请输入毛重！");
				$(".gw").focus();
				return false;
			} else {
				var isnumflag = isNaN($(".gw").val());
				if (isnumflag) {
					layer.msg("毛重必须是数字！")
					return false;
				}
			}
			if ($(".clasp").val() == "") {
				$(".clasp").val(0)
			} else {
				var isnumflag = isNaN($(".clasp").val());
				if (isnumflag) {
					layer.msg("扣杂必须是数字！")
					return false;
				}
			}
			if ($(".point").val() == "") {
				$(".point").val(0);
			} else {
				var pointValue = parseFloat($(".point").val());
				var isnumflag = isNaN(pointValue);
				if (isnumflag) {
					layer.msg("扣点必须是数字！")
					return false;
				}
				if (pointValue < 0 || pointValue > 100) {
					layer.msg("扣点必须在0到100之间！");
					return false;
				}
			}
			if ($(".customer_type").val() == "sznm" && $.trim($(".sznm_code").val()) == "") {
				layer.msg("请输入数农码用户编号！");
				$(".sznm_code").focus();
				return false;
			}
			if ($(".price").val() == "") {
				layer.msg("请输入价格！");
				$(".price").focus();
				return false;
			} else {
				var isnumflag = isNaN($(".price").val());
				if (isnumflag) {
					layer.msg("价格必须是数字！")
					return false;
				}
			}
			var data = {
				code: $("#order_code").val(),
				products_self_id: $("#proself_id").val(),
				suppliers_self_id: $(".suppliers_self_id").val(),
				customer_type: $(".customer_type").val(),
				sznm_code: $.trim($(".sznm_code").val()),
				gw: $(".gw").val(),
				tare: 0,
				clasp: $(".clasp").val(),
				point: $(".point").val() || 0,
				price: $(".price").val(),
				tare_check: tare_check,
				is_pay: 1
			}
			canbtn = false;
			api.showProgress({
				title: '',
				modal: false
			});
			zzappajax("post", hosturl + "app/storage_save.html", data, function (ret) {
				if (ret.err == "false") {
					var printResult = printSavedOrder();
					if (!printResult.success) {
						api.hideProgress();
						canbtn = true;
						hint(printResult.message || "订单已保存，但打印失败");
						return;
					}
					refreshBangdanList();
					hint(printResult.message || "订单已保存并已发送打印");
					window.setTimeout(function () {
						window.location.reload();
					}, 500);
				}
				api.hideProgress();
				canbtn = true;
			}, function (err) {
				if (err) {
					saveerrlog(err.body);
				}
				canbtn = true;
				api.hideProgress();
				return false;
			})
		})
	};
	function initOrderCode() {
		orderCode = (api.pageParam && api.pageParam.code) || createOrderCode();
		$("#order_code").val(orderCode);
		$("#order_code_text").text(orderCode);
		renderOrderQrcode(orderCode);
	}
	function createOrderCode() {
		var now = new Date();
		var month = ("0" + (now.getMonth() + 1)).slice(-2);
		var day = ("0" + now.getDate()).slice(-2);
		var hours = ("0" + now.getHours()).slice(-2);
		var minutes = ("0" + now.getMinutes()).slice(-2);
		var seconds = ("0" + now.getSeconds()).slice(-2);
		var millis = ("00" + now.getMilliseconds()).slice(-3);
		return "BD" + now.getFullYear() + month + day + hours + minutes + seconds + millis;
	}
	function renderOrderQrcode(code) {
		$("#order_qrcode").empty().qrcode({
			render: "canvas",
			width: 180,
			height: 180,
			text: code
		});
	}
	function initDiBangConfig() {
		var bridgeConfig = getBridgeDiBangConfig();
		di_bang_ip = (api.pageParam && api.pageParam.di_bang_ip) || bridgeConfig.diBangIp || "192.168.0.109";
		uart = (api.pageParam && api.pageParam.di_bang_com) || bridgeConfig.diBangCom || "COM1";
	}
	function getBridgeDiBangConfig() {
		if (!(window.AndroidBridge && window.AndroidBridge.getDiBangConfig)) {
			return {};
		}
		try {
			var result = window.AndroidBridge.getDiBangConfig();
			return result ? JSON.parse(result) : {};
		} catch (e) {
			return {};
		}
	}
	function updateScaleStatus(text) {
		$("#scale_status").text(text);
	}
	function read_di_bang_weight() {
		if (ws && ws.readyState == 1) {
			var msg = "{\"m\":" + MAGIC_NUM + ", \"fun\":\"read\",\"port\":\"" + uart + "\"}";
			ws.send(msg);
		}
	}
	function close_web_socket() {
		if (ws) {
			ws.close();
		}
	}
	function get_di_bang_weight() {
		if (!("WebSocket" in window)) {
			updateScaleStatus("当前环境不支持 WebSocket，请手动输入毛重");
			return;
		}
		try {
			ws = new WebSocket("ws://" + di_bang_ip + ":20010");
		} catch (e) {
			updateScaleStatus("连接地磅失败，请手动输入毛重");
			return;
		}
		ws.onopen = function () {
			time_id && window.clearInterval(time_id);
			var openMsg = "{\"m\":" + MAGIC_NUM + ", \"fun\":\"open\",\"port\":\"" + uart + "\"}";
			ws.send(openMsg);
			var readMsg = "{\"m\":" + MAGIC_NUM + ", \"fun\":\"read\",\"port\":\"" + uart + "\"}";
			ws.send(readMsg);
			updateScaleStatus("正在读取地磅读数");
		};
		ws.onmessage = function (evt) {
			var data = evt.data;
			if (data.indexOf("sorry") == -1) {
				updateScaleStatus("收到地磅读数");
			}
			try {
				var dct = eval('(' + data + ')');
				if (dct.fun == "read" && dct.val !== undefined && dct.val !== null && dct.val !== "") {
					$(".gw").val(dct.val);
					updateScaleStatus("待读数稳定");
				}
			} catch (e) {
				updateScaleStatus("地磅读数解析失败，请手动输入毛重");
			}
		};
		ws.onclose = function () {
			updateScaleStatus("地磅连接已断开，正在重连...");
			window.clearInterval(time_id);
			time_id = window.setInterval(get_di_bang_weight, 1000);
		};
		ws.onerror = function () {
			updateScaleStatus("连接地磅失败，请手动输入毛重");
		};
	}
	function printSavedOrder() {
		if (!(window.AndroidBridge && window.AndroidBridge.printOrderReceipt)) {
			return {
				success: false,
				message: "订单已保存，当前环境不支持打印"
			};
		}
		try {
			var resultText = window.AndroidBridge.printOrderReceipt(JSON.stringify(buildPrintPayload()));
			var result = resultText ? JSON.parse(resultText) : {
				success: false,
				message: "打印失败"
			};
			if (result.success) {
				return result;
			}
			if (window.AndroidBridge.printTestReceipt) {
				var fallbackText = window.AndroidBridge.printTestReceipt(JSON.stringify(buildPrintPayload()));
				var fallbackResult = fallbackText ? JSON.parse(fallbackText) : {
					success: false,
					message: "打印失败"
				};
				if (fallbackResult.success) {
					fallbackResult.message = (result.message || "二维码打印失败") + "，已切换为文本小票打印";
				}
				return fallbackResult;
			}
			return result;
		} catch (e) {
			return {
				success: false,
				message: "打印失败，请检查打印机连接"
			};
		}
	}
	function buildPrintPayload() {
		var gw = parseFloat($(".gw").val()) || 0;
		var clasp = parseFloat($(".clasp").val()) || 0;
		var point = parseFloat($(".point").val()) || 0;
		var weight = gw - clasp;
		return {
			title: "订单小票",
			orderNo: $("#order_code").val() || orderCode,
			qrText: $("#order_code").val() || orderCode,
			productName: $("#proself_id option:selected").text() || "",
			supplierName: $(".suppliers_self_id option:selected").text() || "",
			grossWeight: (gw || 0) + " kg",
			clasp: (clasp || 0) + " kg",
			pointPercent: point.toFixed(2) + "%",
			weight: (weight > 0 ? weight.toFixed(2) : "0.00") + " kg",
			price: ($(".price").val() || "0") + " 元/kg",
			payType: "现场支付",
			payTime: formatDateTime(new Date()),
			remark: "新增磅单保存后打印"
		};
	}
	function refreshBangdanList() {
		api.execScript({
			name: "bangdan",
			frameName: "frame1",
			script: "page = 1;getinfo()"
		});
		api.execScript({
			name: "bangdan",
			frameName: "frame3",
			script: "page = 1;getinfo()"
		});
		api.execScript({
			name: "bangdan",
			frameName: "frame4",
			script: "page = 1;getinfo()"
		});
		api.execScript({
			name: "root",
			frameName: "main",
			script: "getinfo()"
		});
	}
	function formatDateTime(date) {
		return date.getFullYear() + "-" + pad(date.getMonth() + 1) + "-" + pad(date.getDate()) + " " + pad(date.getHours()) + ":" + pad(date.getMinutes()) + ":" + pad(date.getSeconds());
	}
	function pad(num) {
		return num < 10 ? "0" + num : "" + num;
	}
	function selectpro(self_id, name) {
		$("#proself_id").val(self_id);
		saveLastSelectedProduct(self_id, name);
	}
	function toggleCustomerType() {
		var customerType = $(".customer_type").val() || "normal";
		if (customerType == "sznm") {
			$(".sznm_code_box").show();
			return;
		}
		$(".sznm_code_box").hide();
		$(".sznm_code").val("");
	}
	function openSznmScan() {
		if (!(window.api && api.require)) {
			layer.msg("当前环境不支持扫码");
			return false;
		}
		var FNScanner = api.require("FNScanner");
		if (!FNScanner || !FNScanner.open) {
			layer.msg("当前设备未安装扫码模块");
			return false;
		}
		FNScanner.open({
			autorotation: true
		}, function (ret, err) {
			if (err) {
				layer.msg(err.msg || "扫码失败");
				return;
			}
			if (!ret) {
				return;
			}
			if (ret.eventType == "success" || ret.content) {
				var sznmCode = $.trim(ret.content || ret.msg || "");
				if (!sznmCode) {
					layer.msg("未识别到数农码编号");
					return;
				}
				$(".sznm_code").val(sznmCode);
				if (FNScanner.closeView) {
					FNScanner.closeView();
				}
			} else if (ret.eventType == "cancel") {
				if (FNScanner.closeView) {
					FNScanner.closeView();
				}
			}
		});
	}
	function keybackFun() {
		return true;
	}
	function saveLastSelectedProduct(self_id, name) {
		localStorage.setItem(LAST_PRODUCT_KEY, JSON.stringify({
			self_id: self_id,
			name: name
		}));
	}
	function getLastSelectedProduct() {
		var value = localStorage.getItem(LAST_PRODUCT_KEY);
		if (!value) {
			return null;
		}
		try {
			return JSON.parse(value);
		} catch (e) {
			localStorage.removeItem(LAST_PRODUCT_KEY);
			return null;
		}
	}
	function restoreSelectedProduct(products) {
		var lastProduct = getLastSelectedProduct();
		if (!lastProduct || !lastProduct.self_id) {
			return;
		}
		var matchedProduct = null;
		$.each(products || [], function (index, item) {
			if ((item.self_id || "").toString() == lastProduct.self_id.toString()) {
				matchedProduct = item;
				return false;
			}
		});
		if (matchedProduct) {
			$("#proself_id").val(matchedProduct.self_id || lastProduct.self_id);
			return;
		}
	}
	function ajaxinfo() {
		var data = {}
		zzappajax("post", hosturl + "app/product_select.html", data, function (ret) {
			//alert(JSON.stringify(ret));
			api.pageParam = api.pageParam || {};
			api.pageParam['prolist'] = ret.products;
			var productHtmls = "<option value=''>请选择产品名称</option>";
			$.each(ret.products || [], function (index, item) {
				productHtmls += "<option value='" + item.self_id + "'>" + item.name + "</option>";
			});
			$("#proself_id").html(productHtmls);
			restoreSelectedProduct(ret.products || []);
			var htmls = "";
			$.each(ret.supplier_list, function (index, item) {
				htmls += "<option value='" + item.self_id + "'>" + item.name + "</option>"
			})
			$(".suppliers_self_id").html(htmls)
			loadinghide();
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			api.hideProgress();
			return false;
		})
	}
	window.onbeforeunload = function () {
		close_web_socket();
	};
</script>

</html>
