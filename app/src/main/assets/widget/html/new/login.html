<!doctype html>
<html>

<head>
	<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
	<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
	<meta content="telephone=no" name="format-detection" />
	<meta content="address=no" name="format-detection" />
	<meta name="apple-mobile-web-app-capable" content="no" />
	<meta name="apple-touch-fullscreen" content="YES">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<title>智慧农业收购管理系统-登录系统</title>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
	<style>
		body {
			min-height: 100vh;
			background:
				radial-gradient(circle at top right, rgba(61, 135, 217, 0.22), transparent 32%),
				linear-gradient(180deg, #edf5ff 0%, #f4f7fb 48%, #eef3f9 100%);
			color: #1f2937;
		}

		.login-page {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.login-header {
			height: 2.8rem;
			padding: 0 0.7rem;
			display: flex;
			align-items: center;
			background: linear-gradient(135deg, #2b6cb0 0%, #3d87d9 100%);
			color: #fff;
			box-shadow: 0 0.18rem 0.8rem rgba(43, 108, 176, 0.18);
		}

		.back-icon {
			width: 2rem;
			color: #fff;
			font-size: 0.9rem;
		}

		.login-title {
			flex: 1;
			text-align: center;
			font-size: 0.82rem;
			font-weight: 600;
			margin-right: 2rem;
		}

		.login-main {
			flex: 1;
			padding: 1rem 0.85rem 1.2rem;
			display: flex;
			flex-direction: column;
			justify-content: center;
		}

		.login-panel {
			background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, #f8fbff 100%);
			border-radius: 0.95rem;
			box-shadow: 0 0.45rem 1.4rem rgba(43, 108, 176, 0.12);
			padding: 1.2rem 1rem 1.1rem;
			border: 1px solid rgba(226, 235, 245, 0.95);
		}

		.login-hero {
			text-align: center;
			margin-bottom: 1rem;
		}

		.logo {
			width: 4.1rem;
			height: 4.1rem;
			margin: 0 auto 0.7rem;
			padding: 0.55rem;
			border-radius: 1rem;
			background: linear-gradient(180deg, #ffffff 0%, #eef5fc 100%);
			box-shadow: 0 0.25rem 0.9rem rgba(61, 135, 217, 0.15);
		}

		.logo img {
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		.hero-title {
			font-size: 1rem;
			font-weight: 700;
			color: #1e3a5f;
			letter-spacing: 0.02rem;
		}

		.hero-subtitle {
			font-size: 0.68rem;
			color: #7b8794;
			margin-top: 0.25rem;
			line-height: 1rem;
		}

		.frombox {
			width: 100%;
		}

		.frombox-ipt {
			display: flex;
			align-items: center;
			height: 2.8rem;
			background: #f7fbff;
			border: 1px solid #dbe7f3;
			border-radius: 0.8rem;
			padding: 0 0.85rem;
			margin-bottom: 0.8rem;
		}

		.frombox-ipt i {
			color: #3d87d9;
			font-size: 0.9rem;
			margin-right: 0.55rem;
		}

		.frombox-ipt input {
			flex: 1;
			border: none;
			background: transparent;
			font-size: 0.78rem;
			color: #1f2937;
		}

		.frombox-ipt input::placeholder {
			color: #94a3b8;
		}

		.frombox-btn {
			padding-top: 0.2rem;
		}

		.login-btn {
			height: 2.9rem;
			line-height: 2.9rem;
			text-align: center;
			border-radius: 0.85rem;
			background: linear-gradient(135deg, #2b6cb0 0%, #3d87d9 100%);
			color: #fff;
			font-size: 0.82rem;
			font-weight: 600;
			box-shadow: 0 0.35rem 1rem rgba(43, 108, 176, 0.22);
		}

		.login-bottom {
			margin-top: 1rem;
			text-align: center;
			font-size: 0.66rem;
			color: #8a97a8;
		}
	</style>

</head>

<body class="new-page-skin">
	<div class="login-page">
		<header class="login-header">
			<a class="back-icon row-column-cnt" href="javascript:void(0)" onclick="javascript :history.back(-1)">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="login-title row-column-cnt">智慧农业管理</div>
		</header>

		<div class="login-main">
			<div class="login-panel">
				<div class="login-hero">
					<div class="logo"><img src="../../image/logo.png" alt="" /></div>
					<div class="hero-title">欢迎登录</div>
					<div class="hero-subtitle">智慧农业收购管理系统<br />请输入账号和密码继续</div>
				</div>
				<div class="frombox">
					<div class="frombox-ipt"><i class="iconfont">&#xe63e;</i><input type="text" class="username" value=""
							placeholder="请输入用户名" /></div>
					<div class="frombox-ipt"><i class="iconfont">&#xe622;</i><input type="password" class="pwd" value=""
							placeholder="请输入密码" /></div>
					<div class="frombox-btn">
						<div class="login-btn j_login_btn">立即登录</div>
					</div>
				</div>
			</div>
			<div class="login-bottom">亿禾技术支持</div>
		</div>
	</div>
</body>

</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jQuery.md5.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var canAjax = true;

	apiready = function () {
		changeserverurl();
		if (UserInfo.has_login()) {
			redirectToHome();
			return;
		}
		fillLastUsername();
		$(".j_login_btn").on("click", function () {
			submitLogin();
		});
		$(".username, .pwd").on("keydown", function (e) {
			if ((e.keyCode || e.which) == 13) {
				submitLogin();
			}
		});
	};

	function fillLastUsername() {
		var username = localStorage.getItem("last_username") || UserInfo.username() || "";
		if (username) {
			$(".username").val(username);
			$(".pwd").focus();
		}
	}

	function submitLogin() {
			var username = $.trim($(".username").val());
			var pwd = $(".pwd").val();
			if (username.length == 0) {
				hint("帐号不能为空！");
				return;
			}
			if (pwd.length == 0) {
				hint("密码不能为空！");
				return;
			}
			api.showProgress({
				title: '登录中',
				modal: false
			});
			postAjax({
				username: username,
				passwdjm: UserInfo.get_pwd_hash(pwd),
				appid: api.deviceId,
				appsystem: api.systemType,
				loginflag: 1
			});
	}

	function postAjax(data) {
		if (!canAjax) {
			return;
		}
		canAjax = false;
		zzappajax("post", hosturl + "app/logincheck.html", data, function (ret) {
			if ((ret && ret.err == "false") || (ret && ret.err === false) || (ret && ret.token)) {
				var pwd_hash = ret.md5pwd || data.passwdjm;
				var token = ret.token || "";
				var memberID = ret.memberID || "";
				var self_id = ret.self_id || "";
				var group_id = ret.group_id || "";
				var username = ret.username ? ret.username.toString() : data.username;
				UserInfo.onSuccess(token, username, pwd_hash, memberID, group_id, self_id);
				canAjax = true;
				api.hideProgress();
				redirectToHome();
				return;
			}
			api.hideProgress();
			hint((ret && ret.errtext) ? ret.errtext : "登录失败，请稍后重试");
			canAjax = true;
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			return false;
		});
	}

	function redirectToHome() {
		api.execScript({
			name: "root",
			script: "reloadapp();"
		});
		window.setTimeout(function () {
			if (window.location.href.indexOf("login.html") > -1) {
				window.location.replace("index.html");
			}
		}, 300);
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
