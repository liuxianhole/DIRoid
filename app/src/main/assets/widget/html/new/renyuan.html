<!doctype html>
<html>

<head>
	<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
	<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
	<meta content="telephone=no" name="format-detection" />
	<meta content="address=no" name="format-detection" />
	<meta name="apple-mobile-web-app-capable" content="no" />
	<link rel="apple-touch-icon-precomposed" href="../../image/logo.png" />
	<link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-precomposed" />
	<meta name="apple-touch-fullscreen" content="YES">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link rel="shortcut icon" href="../../image/favicon.ico" />
	<title>智慧农业收购管理系统-人员管理</title>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<script type="text/javascript" src="../../script/layer/layer.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
</head>

<body class="new-page-skin">
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav aui-border-b new-page-header">
			<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript :history.back(-1)">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">
				人员管理
			</div>
			<a class="aui-pull-right aui-btn aui-btn-outlined">
				<span class="aui-iconfont iconfont">&#xe606;</span> 添加
			</a>
		</header>
	</div>

	<div class="searchbox aui-bg-ff">
		<div class="search-name aui-row aui-padded-md aui-border-b">
			<div class="aui-col-xs-9"><input class="search-ipt" value="" placeholder="请输入姓名" /></div>
			<div class="aui-col-xs-3 aui-text-right">
				<div class="aui-btn aui-btn-info j_search_btn"><i class="iconfont aui-font-size-14">&#xe633;</i>搜索</div>
			</div>
		</div>
	</div>

	<div class="list-box"></div>
	<div class="aui-text-center aui-padded-15 aui-text-999 nodata" style="display:none;">暂无相关数据</div>

	<script id="itemTpl" type="text/html">
			<div class="aui-padded-15 aui-bg-ff aui-border-b aui-border-t aui-margin-t-15">
				<div class="zz-div-box aui-font-size-14">
					<div class="aui-font-size-18">{{d.contact || ''}}</div>
					<div class="row-right column-cnt zz-div-td1">
						<i class="iconfont aui-text-info j_beizhu">&#xe60b;</i>
						<span class="aui-margin-l-10 j_bjbtn" data-id="{{d.id || ''}}">编辑</span>
					</div>
				</div>
				<div class="aui-margin-t-10 aui-font-size-12 zz-div-box">
					<div class="zz-div-td1">
						<div class="aui-text-66">手机：{{d.mobile || ''}}</div>
						<div class="aui-text-66">用户类别：{{d.utype || ''}}</div>
						<div class="aui-text-66">用户名：{{d.username || ''}}</div>
					</div>
					<div class="column-btm">
						<div class="aui-text-66">{{d.company_name || d.address || ''}}</div>
					</div>
				</div>
			</div>
		</script>

	<div class="pop-gy aui-bg-ff aui-padded-10" style="display: none;">
		<ul class="aui-list aui-form-list aui-font-size-14 limd-top">
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label ">用户级别：</div>
					<div class="aui-list-item-input"><select name="" class="aui-font-size-14">
							<option value="">请选择</option>
						</select></div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label ">分站：</div>
					<div class="aui-list-item-input"><select name="" class="aui-font-size-14">
							<option value="">请选择</option>
						</select></div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label ">用户名：</div>
					<div class="aui-list-item-input"><input type="text" class="aui-font-size-14" placeholder="请输入用户名">
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">姓名：</div>
					<div class="aui-list-item-input"><input type="text" class="aui-font-size-14" placeholder="请输入姓名">
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">性别：</div>
					<div class="aui-list-item-input"><label><input class="aui-radio" type="radio" name="demo1" checked>
							男</label><label><input class="aui-radio" type="radio" name="demo1"> 女</label></div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">手机：</div>
					<div class="aui-list-item-input"><input type="text" class="aui-font-size-14" placeholder="请输手机">
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">密码：</div>
					<div class="aui-list-item-input"><input type="text" class="aui-font-size-14" placeholder="请输手机">
					</div>
				</div>
			</li>
			<li class="aui-list-item limd ">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-input aui-text-right"><label><input class="aui-radio" type="checkbox"
								name="resnum"> 是否修改密码</label></div>
				</div>
			</li>
			<li class="aui-list-item limd">
				<div class="aui-list-item-label">备注：</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-input"><textarea type="password" placeholder="请输入备注"
						class="aui-font-size-14 form-info bj-text"></textarea></div>
			</li>
		</ul>
		<div class="aui-text-center aui-padded-15">
			<botton class="aui-btn aui-btn-outlined j_delgy">删除</botton>&nbsp;&nbsp;&nbsp;&nbsp;
			<botton class="aui-btn aui-btn-info">保存</botton>
		</div>
	</div>
</body>

</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var keyword = "";

	apiready = function () {
		changeserverurl();
		bindEvent();
		getinfo();
	};

	function bindEvent() {
		$(".j_search_btn").on("click", function () {
			keyword = $(".search-ipt").val();
			getinfo();
		});
		$(".list-box").on("click", ".j_bjbtn", function () {
			layer.open({
				type: 1,
				title: false,
				skin: 'layui-pop-gy',
				closeBtn: 1,
				anim: 2,
				area: ["90%", ""],
				shadeClose: true,
				content: $(".pop-gy")
			});
		});
		$(".j_delgy").on("click", function () {
			layer.confirm('确定删除信息？', {
				btn: ['确定', '取消']
			}, function () {
				layer.msg('删除成功', { icon: 1 });
			}, function () {
				layer.closeAll();
			});
		});
	}

	function getinfo() {
		var data = {
			page: 1,
			contact: keyword
		};
		zzappajax("post", hosturl + "app/user.html", data, function (ret) {
			var list = ret.listall || [];
			var html = "";
			$.each(list, function (index, item) {
				var tpl = $api.html($api.byId("itemTpl"));
				laytpl(tpl).render(item, function (rendered) {
					html += rendered;
				});
			});
			$(".list-box").html(html);
			$(".nodata").toggle(list.length === 0);
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			$(".list-box").html("");
			$(".nodata").show();
		});
	}
</script>
