<!doctype html>
<html>

<head>
	<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
	<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
	<meta content="telephone=no" name="format-detection" />
	<meta content="address=no" name="format-detection" />
	<meta name="apple-mobile-web-app-capable" content="no" />
	<link rel="apple-touch-icon-precomposed" href="../../image/logo.png" />
	<link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-precomposed" />
	<meta name="apple-touch-fullscreen" content="YES">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link rel="shortcut icon" href="../../image/favicon.ico" />
	<title>智慧农业收购管理系统-报价系统</title>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<script type="text/javascript" src="../../script/layer/layer.js"></script>
	<link href="../../css/mobiscroll.custom-2.6.2.min.css" rel="stylesheet"
		type="text/css" />
	<script src="../../script/mobiscroll.custom-2.6.2.min.js"
		type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
</head>

<body class="new-page-skin">
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav aui-border-b new-page-header">
			<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript :history.back(-1)">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">报价系统</div>
			<a class="aui-pull-right aui-btn aui-btn-outlined">
				<span class="aui-iconfont iconfont">&#xe606;</span> 发布
			</a>
		</header>
	</div>

	<div class="searchbox aui-bg-ff">
		<div class="search-time aui-padded-md zz-div-box aui-border-b">
			<div class="search-time-md">日期：</div>
			<div class="zz-div-td1 timeipt-box"><input type="" name="" id="" value="" class="timeipt j_timeipt" /><i
					class="iconfont timeipt-icon">&#xe65b;</i></div>
			<div class="search-time-md">-</div>
			<div class="zz-div-td1 timeipt-box"><input type="" name="" id="" value="" class="timeipt j_timeipt" /><i
					class="iconfont timeipt-icon">&#xe65b;</i></div>
		</div>
	</div>

	<div class="list-box"></div>
	<div class="aui-text-center aui-padded-15 aui-text-999 nodata" style="display:none;">暂无报价数据</div>

	<script id="itemTpl" type="text/html">
			<div class="aui-padded-15 aui-bg-ff aui-border-b aui-border-t aui-margin-t-15">
				<div class="zz-div-box aui-font-size-14">
					<div class="font_bold aui-font-size-18">{{d.title || d.name || ''}}</div>
					<div class="row-right column-cnt zz-div-td1"><span class="j_bjbtn">编辑</span></div>
				</div>
				<div class="zz-div-box aui-margin-t-10 aui-font-size-14">
					<div class="zz-div-td1 aui-margin-r-15">
						<div class="aui-text-66">{{d.content || d.info || ''}}</div>
						<div class="aui-text-99 aui-margin-t-10">{{d.gmt_created || ''}}</div>
					</div>
					<div class="column-btm">
						<div class="aui-btn {{ d.send_status == 1 ? 'aui-btn-outlined' : 'aui-btn-info' }}">{{ d.send_status == 1 ? '已发' : '群发' }}</div>
					</div>
				</div>
			</div>
		</script>

	<div class="pop-bj aui-bg-ff aui-padded-10" style="display: none;">
		<div class="aui-padded-15 aui-text-center font_bold">编辑报价</div>
		<ul class="aui-list aui-form-list">
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label font_bold">日期：</div>
					<div class="aui-list-item-input"><input type="text" class="aui-font-size-14 j_timeipt"
							placeholder="请选择日期"></div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label font_bold">标题：</div>
					<div class="aui-list-item-input"><input type="text" class="aui-font-size-14" placeholder="请输入手机姓名">
					</div>
				</div>
			</li>
			<li class="aui-list-item limd">
				<div class="aui-list-item-label font_bold">报价内容：</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-input"><textarea type="password" placeholder="请输入报价内容"
						class="aui-font-size-14 form-info bj-text"></textarea></div>
			</li>
		</ul>
		<div class="aui-text-center aui-padded-15">
			<botton class="aui-btn aui-btn-outlined j_delgy">删除</botton>&nbsp;&nbsp;&nbsp;&nbsp;
			<botton class="aui-btn aui-btn-info">保存</botton>
		</div>
	</div>
</body>

</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	apiready = function () {
		changeserverurl();
		bindEvent();
		initDatePicker();
		getinfo();
	};

	function bindEvent() {
		$(".list-box").on("click", ".j_bjbtn", function () {
			layer.open({
				type: 1,
				title: false,
				skin: 'layui-layer-demo',
				closeBtn: 1,
				anim: 2,
				area: ["90%", ""],
				zIndex: 98,
				shadeClose: true,
				content: $(".pop-bj")
			});
		});
		$(".j_delgy").on("click", function () {
			layer.confirm('确定删除信息？', {
				btn: ['确定', '取消']
			}, function () {
				layer.msg('删除成功', { icon: 1 });
			}, function () {
				layer.closeAll();
			});
		});
		$(".j_timeipt").on("change", function () {
			getinfo();
		});
	}

	function initDatePicker() {
		var currYear = (new Date()).getFullYear();
		$(".j_timeipt").mobiscroll({
			preset: 'date',
			theme: 'android-ics light',
			display: 'modal',
			mode: 'scroller',
			dateFormat: 'yy-mm-dd',
			setText: '确定',
			cancelText: '取消',
			dateOrder: 'yymmdd',
			yearText: '年',
			monthText: '月',
			dayText: '日',
			startYear: currYear - 5,
			endYear: currYear + 5,
			lang: "zh",
			showNow: true,
			nowText: '今天'
		});
	}

	function getinfo() {
		var data = {};
		if ($(".j_timeipt").eq(0).val()) {
			data.time_min = $(".j_timeipt").eq(0).val();
		}
		if ($(".j_timeipt").eq(1).val()) {
			data.time_max = $(".j_timeipt").eq(1).val();
		}
		zzappajax("post", hosturl + "app/offer.html", data, function (ret) {
			var list = ret.listall || ret.result || [];
			var html = "";
			$.each(list, function (index, item) {
				var tpl = $api.html($api.byId("itemTpl"));
				laytpl(tpl).render(item, function (rendered) {
					html += rendered;
				});
			});
			$(".list-box").html(html);
			$(".nodata").toggle(list.length === 0);
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			$(".list-box").html("");
			$(".nodata").show();
		});
	}
</script>
