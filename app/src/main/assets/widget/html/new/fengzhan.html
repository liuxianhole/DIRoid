<!doctype html>
<html>

<head>
	<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
	<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
	<meta content="telephone=no" name="format-detection" />
	<meta content="address=no" name="format-detection" />
	<meta name="apple-mobile-web-app-capable" content="no" />
	<link rel="apple-touch-icon-precomposed" href="../../image/logo.png" />
	<link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-precomposed" />
	<meta name="apple-touch-fullscreen" content="YES">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<link rel="shortcut icon" href="../../image/favicon.ico" />
	<title>智慧农业收购管理系统</title>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
	<script type="text/javascript" src="../../script/layer/layer.js"></script>
	<link rel="stylesheet" type="text/css" href="../../script/mobile-select-area.css">
	<script type="text/javascript" src="../../script/json.js"></script>
	<script type="text/javascript" src="../../script/dialog.js"></script>
	<script type="text/javascript" src="../../script/mobile-select-area.js"></script>
	<link rel="stylesheet" type="text/css" href="../../css/index.css">
</head>

<body class="new-page-skin">
	<div style="height:2.25rem;">
		<header class="aui-bar aui-bar-nav aui-border-b new-page-header">
			<a class="aui-pull-left" href="index.html">
				<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			</a>
			<div class="aui-title">
				分站管理
			</div>
			<a class="aui-pull-right aui-btn aui-btn-outlined j_add_btn">
				<span class="aui-iconfont iconfont">&#xe606;</span> 添加
			</a>
		</header>
	</div>

	<div class="searchbox aui-bg-ff">
		<div class="search-name aui-row aui-padded-md aui-border-b">
			<div class="aui-col-xs-9"><input class="search-ipt" value="" placeholder="请输入分站名" /></div>
			<div class="aui-col-xs-3 aui-text-right">
				<div class="aui-btn aui-btn-info j_search_btn"><i class="iconfont aui-font-size-14">&#xe633;</i>搜索</div>
			</div>
		</div>
	</div>

	<div class="list-box"></div>
	<div class="aui-text-center aui-padded-15 aui-text-999 nodata" style="display:none;">暂无相关数据</div>

	<script id="itemTpl" type="text/html">
			<div class="aui-padded-15 aui-bg-ff aui-border-b aui-border-t aui-margin-t-15">
				<div class="zz-div-box aui-font-size-14">
					<div class="font_bold aui-font-size-18">{{d.name || ''}}</div>
					<div class="row-right column-cnt zz-div-td1">
						<span class="aui-margin-l-10"><span class="aui-margin-l-10 j_bjbtn" data-id="{{d.id || ''}}">编辑</span></span>
					</div>
				</div>
				<div class="aui-margin-t-10 aui-font-size-12">
					<div class="aui-text-66">分站类型：{{d.c_type || ''}}</div>
					<div class="aui-text-66">地址：{{d.address || ''}}</div>
				</div>
			</div>
		</script>

	<div class="pop-gy aui-bg-ff aui-padded-10" style="display: none;">
		<ul class="aui-list aui-form-list aui-font-size-14 limd-top">
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label ">分站名称：</div>
					<div class="aui-list-item-input"><input type="text" class="aui-font-size-14 station-name" placeholder="请输入分站名称">
					</div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label ">分站类型：</div>
					<div class="aui-list-item-input"><select name="" class="aui-font-size-14 station-c-type">
							<option value="">请选择</option>
							<option value="1">个人</option>
							<option value="2">公司</option>
						</select></div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label ">所在省市：</div>
					<div class="aui-list-item-input downbox"><input type="text" class="aui-font-size-14"
							placeholder="请选择省市" id="city"></div>
				</div>
			</li>
			<li class="aui-list-item">
				<div class="aui-list-item-inner">
					<div class="aui-list-item-label">详细地址：</div>
					<div class="aui-list-item-input"><textarea name="" class="aui-font-size-14 station-address" cols=""
							placeholder="请输入详细地址"></textarea></div>
				</div>
			</li>
		</ul>
		<div class="aui-text-center aui-padded-15">
			<botton class="aui-btn aui-btn-outlined j_delgy">删除</botton>&nbsp;&nbsp;&nbsp;&nbsp;
			<botton class="aui-btn aui-btn-info j_save_btn">保存</botton>
		</div>
	</div>
</body>

</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var keyword = "";
	var currentCompanyId = "";
	var companyLayerIndex = 0;

	apiready = function () {
		changeserverurl();
		bindEvent();
		getinfo();
	};

	function bindEvent() {
		$(".j_search_btn").on("click", function () {
			keyword = $(".search-ipt").val();
			getinfo();
		});
		$(".j_add_btn").on("click", function () {
			openCompanyDialog();
		});
		$(".list-box").on("click", ".j_bjbtn", function () {
			openCompanyDialog($(this).attr("data-id") || "");
		});
		$(".list-box").on("click", ".aui-padded-15", function (e) {
			if ($(e.target).closest(".j_bjbtn").length) {
				return;
			}
			openCompanyDialog($(this).find(".j_bjbtn").attr("data-id") || "");
		});
		$(".j_save_btn").on("click", function () {
			saveCompany();
		});
		$(".j_delgy").on("click", function () {
			layer.confirm('确定删除信息？', {
				btn: ['确定', '取消']
			}, function () {
				layer.msg('删除成功', { icon: 1 });
			}, function () {
				layer.closeAll();
			});
		});
		$("#city").on("focus", function () {
			$(this).blur();
		});
		new MobileSelectArea().init({
			trigger: $("#city"),
			position: "bottom",
			data: cityJson,
			callback: function (scroller, text) {
				$("#city").val(text.join("-"));
			}
		});
	}

	function resetCompanyForm() {
		currentCompanyId = "";
		$(".station-name").val("");
		$(".station-c-type").val("");
		$("#city").val("");
		$(".station-address").val("");
		$(".j_delgy").hide();
	}

	function normalizeCType(value) {
		value = (value || "").toString();
		if (value == "个人") {
			return "1";
		}
		if (value == "公司") {
			return "2";
		}
		return value;
	}

	function fillCompanyForm(info) {
		if (info && info.result) {
			info = info.result;
		}
		info = info || {};
		$(".station-name").val(info.name || "");
		$(".station-c-type").val(normalizeCType(info.c_type || ""));
		$("#city").val("");
		$(".station-address").val(info.address || "");
	}

	function openCompanyDialog(id) {
		resetCompanyForm();
		currentCompanyId = id || "";
		$(".j_delgy").toggle(!!currentCompanyId);
		companyLayerIndex = layer.open({
			type: 1,
			title: false,
			skin: 'layui-pop-gy',
			closeBtn: 1,
			anim: 2,
			area: ["90%", ""],
			zIndex: 90,
			shadeClose: true,
			content: $(".pop-gy")
		});
		if (currentCompanyId) {
			zzappajax("post", hosturl + "app/company_mod.html", {
				id: currentCompanyId
			}, function (ret) {
				if (ret && ret.err == "false") {
					fillCompanyForm(ret.result || ret);
					return;
				}
				layer.msg((ret && ret.errtext) || "获取分站信息失败");
			}, function (err) {
				if (err) {
					saveerrlog(err.body);
				}
			});
		}
	}

	function saveCompany() {
		var name = $.trim($(".station-name").val() || "");
		var c_type = $(".station-c-type").val() || "";
		if (!name) {
			layer.msg("请输入分站名称");
			return false;
		}
		if (!c_type) {
			layer.msg("请选择分站类型");
			return false;
		}
		var data = {
			id: currentCompanyId,
			name: name,
			c_type: c_type,
			address: $.trim($(".station-address").val() || "")
		};
		zzappajax("post", hosturl + "app/company_save.html", data, function (ret) {
			if (ret && ret.err == "true") {
				layer.msg(ret.errtext || "保存失败");
				return;
			}
			layer.msg(ret.errtext || "保存成功");
			layer.close(companyLayerIndex);
			getinfo();
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
		});
	}

	function getinfo() {
		var data = {
			page: 1,
			name: keyword
		};
		zzappajax("post", hosturl + "app/company.html", data, function (ret) {
			var list = ret.listall || [];
			var html = "";
			$.each(list, function (index, item) {
				var tpl = $api.html($api.byId("itemTpl"));
				laytpl(tpl).render(item, function (rendered) {
					html += rendered;
				});
			});
			$(".list-box").html(html);
			$(".nodata").toggle(list.length === 0);
		}, function (err) {
			if (err) {
				saveerrlog(err.body);
			}
			$(".list-box").html("");
			$(".nodata").show();
		});
	}
</script>
