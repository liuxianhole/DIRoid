<!doctype html>
<html>
	<head>
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
		<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
		<meta content="telephone=no" name="format-detection" />
		<meta content="address=no" name="format-detection" />
		<meta name="apple-mobile-web-app-capable" content="no" />
		<link rel="apple-touch-icon-precomposed" href="http://img0.zz91.com/zz91/images/logo.png" />
		<link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-precomposed" />
		<meta name="apple-touch-fullscreen" content="YES">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black">
		<link rel="shortcut icon" href="https://img0.zz91.com/front/favicon.ico" />
		<title>互助社区-zz91再生网</title>
		<script type="text/javascript" src="../../script/jquery.js"></script>
		<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
		<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css" />
		<script type="text/javascript" src="../../script/layer/layer.js"></script>
		<link href="https://m.zz91.com/zt/dibang/mobiscroll/mobiscroll.custom-2.6.2.min.css" rel="stylesheet" type="text/css" />
		<script src="https://m.zz91.com/zt/dibang/mobiscroll/mobiscroll.custom-2.6.2.min.js" type="text/javascript"></script>
		<link rel="stylesheet" type="text/css" href="https://m.zz91.com/zt/dibang/css/index.css">
	</head>
	<body>
		<div style="height:2.25rem;">
			<header class="aui-bar aui-bar-nav  aui-border-b ">
				<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript :history.back(-1)">
					<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
				</a>
				<div class="aui-title">数据汇总</div>
			</header>
		</div>

		<div class="searchbox aui-bg-ff">
			<div class="search-time aui-padded-md zz-div-box aui-border-b">
				<div class="search-time-md">日期：</div>
				<div class="zz-div-td1 timeipt-box">
					<input type="" name="" id="" value="" class="timeipt" />
					<i class="iconfont timeipt-icon">&#xe65b;</i>
				</div>
				<div class="search-time-md">-</div>
				<div class="zz-div-td1 timeipt-box">
					<input type="" name="" id="" value="" class="timeipt" />
					<i class="iconfont timeipt-icon">&#xe65b;</i>
				</div>
			</div>
		</div>

		<div class="aui-content aui-font-size-12 aui-bg-ff aui-margin-t-15 shuju-list">
			<div class="aui-row aui-text-center aui-border-b">
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">品名</div>
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">入库量（kg）</div>
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">入库总额</div>
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">均价</div>
			</div>
			<div class="list-box"></div>
			<div class="aui-row aui-text-center aui-border-b total-row">
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">合计</div>
				<div class="aui-col-xs-4 aui-padded-b-10 aui-padded-t-10">入库量：<span class="aui-text-danger total_weight"></span></div>
				<div class="aui-col-xs-4 aui-padded-b-10 aui-padded-t-10">总金额：<span class="aui-text-danger total_price"></span></div>
			</div>
		</div>
		<div class="aui-text-center aui-padded-15 aui-text-999 nodata" style="display:none;">暂无相关数据</div>

		<script id="itemTpl" type="text/html">
			<div class="aui-row aui-text-center aui-border-b">
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">{{d.name || ''}}</div>
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">{{d.total_gw || ''}}</div>
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">{{d.total_price || ''}}</div>
				<div class="aui-col-xs-3 aui-padded-b-10 aui-padded-t-10">{{d.average || ''}}</div>
			</div>
		</script>
	</body>
</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	apiready = function(){
		changeserverurl();
		bindEvent();
		getinfo();
	};

	function bindEvent(){
		var currYear = (new Date()).getFullYear();
		$(".timeipt").mobiscroll({
			preset: 'date',
			theme: 'android-ics light',
			display: 'modal',
			mode: 'scroller',
			dateFormat: 'yy-mm-dd',
			setText: '确定',
			cancelText: '取消',
			dateOrder: 'yymmdd',
			yearText: '年',
			monthText: '月',
			dayText: '日',
			endYear: currYear + 2,
			lang:"zh",
			showNow:true,
			minDate:new Date(),
			nowText:'今天'
		});
		$(".timeipt").on("change", function(){
			getinfo();
		});
	}

	function getinfo(){
		var data = {};
		if ($(".timeipt").eq(0).val()) {
			data.time_min = $(".timeipt").eq(0).val();
		}
		if ($(".timeipt").eq(1).val()) {
			data.time_max = $(".timeipt").eq(1).val();
		}
		zzappajax("post", hosturl + "app/alldata.html", data, function(ret){
			var list = ret.listall || [];
			var html = "";
			$.each(list, function(index, item){
				var tpl = $api.html($api.byId("itemTpl"));
				laytpl(tpl).render(item, function(rendered){
					html += rendered;
				});
			});
			$(".list-box").html(html);
			$(".total_weight").text(ret.total_weight || "");
			$(".total_price").text(ret.total_price || "");
			$(".nodata").toggle(list.length === 0);
			$(".total-row").toggle(list.length > 0);
		}, function(err){
			if(err){
				saveerrlog(err.body);
			}
			$(".list-box").html("");
			$(".total_weight").text("");
			$(".total_price").text("");
			$(".total-row").hide();
			$(".nodata").show();
		});
	}
</script>
