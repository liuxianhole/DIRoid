<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../css/api.css" />
    <link rel="stylesheet" type="text/css" href="../../css/aui.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/common.css"/>
    <style>
    	.db-gy-title{
			width: 80px;
			text-align: right;
			color: #2ecc71
		}
    </style>
</head>
<body>
	<div class="db-bg-white">
		<div class="aui-padded-15  zz-div-box">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">分站名称</div>
			<div class="zz-div-td1">
				<input type="text" class="aui-margin-b-0 mustipt db-input name" >
			</div>
		</div>
		<div class="aui-padded-15  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">分站类型</div>
			<div class="zz-div-td1">
				<div class="db-select-box">
					<select name="" id="" class="db-select ctype">
						<option value="个人">个人</option>
						<option value="公司">公司</option>
					</select>
				</div>
			</div>
		</div>
		<div class="aui-padded-15  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">地址</div>
			<div class="zz-div-td1">
				<input type="text" class="aui-margin-b-0 mustipt db-input address" >
			</div>
		</div>
		

		<div class="aui-padded-15  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title"></div>
			<div class="zz-div-td1">
				<div class="aui-btn aui-btn-success j_btn">&nbsp;保存&nbsp;</div>
			</div>
		</div>
	</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	apiready = function(){
		changeserverurl();
		id=api.pageParam.id;
		var data={
			id:id
		}
		if (id){
			loadingshow();
			zzappajax("post",hosturl+"app/company_mod.html",data,function(ret){
				api.hideProgress();
				if (ret.err=="false"){
					$(".name").val(ret.result.name);
					$(".ctype").val(ret.result.ctype);
					$(".address").val(ret.result.address);
					api.hideProgress();
				}else{
					layer.msg(ret.errtext)
				}
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				api.hideProgress();
				return false;
			})
		}
		domEvent();
	};
	
	
	var canAjax = true;
	var domEvent = function(){
		$(".j_btn").on("click",function(){
			if(!canAjax){
				return;
			}
			var name = $(".name").val();
			var ctype = $(".ctype").val();
			var address = $(".address").val();
			if (name.length == 0) {
				hint("分站名称不能为空！");
				api.hideProgress();
				return;
			}
			var data = {
				name:name,
				ctype:ctype,
				address:address,
				id:id
			}
			loadingshow()
			canAjax = false;
			//alert(JSON.stringify(data))
			zzappajax("post",hosturl+"app/company_save.html",data,function(ret){
				if(ret.err=="false"){
					api.alert({
						title : '',
						msg : ret.errtext,
						buttons : ['确定']
					}, function(ret, err) {
						api.execScript({
							name : "fenzhan",
							frameName:"fenzhan_",
							script : "page = 1;getinfo();"
						});
						api.closeWin({
			            });
						api.hideProgress();
						canseve = true;
					});
				}
				canseve = true;
				canAjax = true;
				api.hideProgress();
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				canAjax = true;
				canseve = true;
				api.hideProgress();
				return false;
			})
		})
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
