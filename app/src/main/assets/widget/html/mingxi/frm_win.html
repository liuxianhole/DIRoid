<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
		<meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
		<title>title</title>
		<link rel="stylesheet" type="text/css" href="../../css/aui.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/common.css"/>
		<style>
			body {
				background-color: #D2D6DE
			}
			.searchbox{
				margin:10px;
				height:125px;
			}
			.aui-flex-col{
				margin-bottom: 4px;
			}
			.aui-flex-col input{
				padding:2
			}
			.stitle{
				line-height: 32px
			}
		</style>
	</head>
	<body>
		<div class="searchmain">
			<div class="searchbox">
				<div class="aui-flex-col">
					<div class="aui-flex-item-2 stitle">打包站：</div>
					<div class="aui-flex-item-4">
						<select name="" class="db-select company_id">
							<option value="">----</option>
						</select>
					</div>
					<div class="aui-flex-item-6"> &nbsp;&nbsp;品类：<span class="aui-btn aui-btn-outlined selectproducts">全部+</span>
						<input type="hidden" id="proself_id" value="">
					</div>
				</div>
				<div class="aui-flex-col">
					<div class="aui-flex-item-2 stitle">日期：</div>
					<div class="aui-flex-item-10"><input type="text" class="gtime start_date" style="width: 40%" />&nbsp;&nbsp;至&nbsp;&nbsp;<input type="text" class="gtime end_date" style="width: 40%"></div>
				</div>
				<div class="aui-flex-col">
					<div class="aui-flex-item-2 stitle">供货人：</div>
					<div class="aui-flex-item-8"><input type="text" class="aui-margin-b-0 supplier_name" placeholder="请输入供货人编号，姓名" style="width: 90%"></div>
					<div class="aui-flex-item-2"><span class="aui-btn aui-btn-info searchbtn" style="padding: 4px"><span class="aui-iconfont aui-icon-search"></span>搜索</span></div>
				</div>
			</div>
		</div>
		<div id="main"></div>
	</body>
	<script type="text/javascript" src="../../script/api.js"></script>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<script type="text/javascript" src="../../script/layer/layer.js"></script>
	<script type="text/javascript" src="../../script/common.js"></script>
	<script type="text/javascript">
		apiready = function() {
			var $body = $api.dom('body');
			var iosstatusheight=getisostatusheight();
			var header_h = $(".searchmain").height() + 46+iosstatusheight;
			api.openFrameGroup({
				preload :1 ,
				name : 'group1',
				rect : {
					x : 0,
					y : header_h,
					w : 'auto',
					h : 'auto'
				},
				frames : [{
					name : 'frame1',
					url : 'all.html',
					bgColor : '#f2f2f2'
				}]
			}, function(ret, err) {
				var index = ret.index;
				
			});
			ajaxinfo();
			domEvent();
		
		}
		var domEvent = function() {
			
			//选择地区
			$(".selectproducts").on("click", function() {
				openwindows("selectproduct", '../bangdan/selectproduct.html')
			})
			$(".searchbtn").on("click", function() {
				api.execScript({
					name : api.winName,
					frameName:"frame1",
					script : "searchall('"+$(".company_id").val()+"','"+$("#proself_id").val()+"','"+$(".start_date").val()+"','"+$(".end_date").val()+"','"+$(".supplier_name").val()+"')"
				});
			})
			
			$(".gtime").on("click", function() {
				var iptThis=$(this)
				api.openPicker({
				    type: 'date',
				    date: getdata(iptThis.val()),
				    title: '选择时间'
				}, function(ret, err) {
				    if (ret) {		    				
						var now=ret.year+'-'+p(ret.month)+"-"+p(ret.day);
				        iptThis.val(now)
				    } else {
				        //alert(JSON.stringify(err));
				    }
				});
			})
		}
		function selectpro(self_id,name){
			$(".selectproducts").html(name);
			$("#proself_id").val(self_id);
		}
		function ajaxinfo(){
			var data={}
			zzappajax("post",hosturl+"app/product_select.html",data,function(ret){
				//alert(JSON.stringify(ret));
				api.pageParam['prolist']=ret.products;
				var htmls="<option value=''>全部</option>";
				$.each(ret.company, function(index, item) {
					htmls+="<option value='"+item.id+"'>"+item.name+"</option>"
				})
				$(".company_id").html(htmls)
				loadinghide();
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				api.hideProgress();
				return false;
			})
		}
		function p(s) {
		    return s < 10 ? '0' + s: s;
		}
		function getdata(ndate){
			if (ndate){
				return ndate
			}
			var myDate = new Date();
			//获取当前年
			var year=myDate.getFullYear();
			//获取当前月
			var month=myDate.getMonth()+1;
			//获取当前日
			var date=myDate.getDate(); 
			
			var now=year+'-'+p(month)+"-"+p(date);
			return now;
		}
	</script>
	<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
