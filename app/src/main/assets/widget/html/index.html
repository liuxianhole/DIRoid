<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title>智收易</title>
    <link rel="stylesheet" type="text/css" href="../css/common.css"/>	
    <link rel="stylesheet" type="text/css" href="../css/api.css" />
    
    <link rel="stylesheet" type="text/css" href="../css/aui.css"/>
	<link rel="stylesheet" type="text/css" href="../css/aui-flex.css"/>	
    <style type="text/css">
    html,body{
        height: 100%;
    }
    #wrap{
        height: 100%;
        display: -webkit-box;
        display: -webkit-flex;
        display: flex;
        -webkit-box-orient: vertical;
        -webkit-flex-flow: column;
               flex-flow: column;
    }
    #header{
        text-align: center; background-color: #81a9c3; color: #fff;
        width: 100%;
    }
    #header h1{
        font-size: 20px; height: 44px; line-height: 44px; margin: 0em; color: #fff;
    }
    #main{
        -webkit-box-flex: 1; 
        -webkit-flex: 1;
        flex: 1;
    }
    .con{font-size: 28px; text-align: center;}
    </style>
</head>
<body>
    <div id="wrap">
        <div id="header">
            <header class="aui-bar aui-bar-nav aui-bar-primary zz-header  aui-bg-success">
		    	<a class="aui-pull-left">
			        智收易
			    </a>
			    <a class="aui-pull-right myinfo">
			        <i class="aui-iconfont aui-icon-peoplefill"></i>
			    </a>
			</header>
        </div>
        <div id="main">
                
        </div>
    </div>
</body>
<script type="text/javascript" src="../script/api.js"></script>
<script type="text/javascript" src="../script/jquery.js"></script>
<script type="text/javascript" src="../script/layer/layer.js"></script>
<script type="text/javascript" src="../script/common.js"></script>
<script type="text/javascript">
    apiready = function(){
		//console.log("Hello APICloud");

        var header = $api.byId('header');
        //适配iOS 7+，Android 4.4+状态栏
        $api.fixStatusBar(header);

        var headerPos = $api.offset(header);
        var main = $api.byId('wrap');
        var mainPos = $api.offset(main);
        var login_sn = UserInfo.has_login();
		if (login_sn){
        	var url="../html/new/index.html";
        	$(".myinfo").show();
        }else{
        	var url="../html/new/login.html";
        	$(".myinfo").hide();
        }
        api.openFrame({
            name: 'main',
            url: url,
            bounces: true,
            rect: {
                x: 0,
                y: headerPos.h,
                w: 'auto',
                h: mainPos.h
            }
        });
        
        $(".myinfo").on("click",function(){
			var pageParam = {
				wintitle : "我的资料",
				type : "myinfo",
				bounces : false
			};
   			openWin("myinfo", "../new/myiss.html", pageParam);
		})
		//alert(UserInfo.token())
    };
    function reloadapp(){
    	var login_sn = UserInfo.has_login();
		if (login_sn){
        	var url="../html/new/index.html";
        	$(".myinfo").show();
        }else{
        	var url="../html/new/login.html";
        	$(".myinfo").hide();
        }
        var header = $api.byId('header');
        var headerPos = $api.offset(header);
        var main = $api.byId('wrap');
        var mainPos = $api.offset(main);
        api.openFrame({
            name: 'main',
            url: url,
            bounces: true,
            rect: {
                x: 0,
                y: headerPos.h,
                w: 'auto',
                h: mainPos.h
            }
        });
    }
    
</script>
<script type="text/javascript" src="../script/servercomm.js"></script>
</html>
