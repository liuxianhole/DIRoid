<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <link rel="stylesheet" type="text/css" href="../../css/aui.css" />
    <style>
	.aui-nav .aui-bar-tab {
        background: #34495E;
    }
    .aui-nav .aui-bar-tab li .aui-iconfont,
    .aui-nav .aui-bar-tab li p {
        color: #fff;
    }
    .aui-nav .aui-bar-tab li.active .aui-iconfont,
    .aui-nav .aui-bar-tab li.active p {
        color: #14bd7c;
    }
	.aui-nav {
        background: #eee;
        font-size: 16px;
        text-align: center;
        height:105px;
        
    }
    .aui-nav p {
        color: #fff;
    }
    .aui-nav .aui-iconfont {
        font-size: 20px;
        color: #ffffff;
    }
    .buy{
    	
    }
    .blue {
    }
    .blue .aui-iconfont,
    .blue p {
        color: #999;
    }
    .total{
    	font-size:16px;
    	line-height:40px
    }
	</style>
</head>
<body>
    <footer class="aui-nav" id="aui-footer">
		<div class="total">合计金额：￥<font color="red" class="allje">0.00</font></div>
		<div class="aui-line-x"></div>
		<div style="height: 5px"></div>
        <div class="aui-col-xs-6 buy" tapmode style="display:none">
            <div class="aui-btn aui-btn-info">审核通过<br />（暂不支付）</div>
        </div>
        <div class="aui-col-xs-6 blue" style="display:none">
        	<div class="aui-btn aui-btn-success">审核通过<br />（现场支付） </div>
        </div>
        <div class="aui-col-xs-12 checkpay" style="display:none">
        	<div class="aui-btn aui-btn-success">确认已经支付 </div>
        </div>
    </footer>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
    apiready = function(){
    	changeserverurl()
		api.parseTapmode();
		var is_pay=api.pageParam.is_pay;
		if (is_pay==0){
			$(".buy").show();
			$(".blue").show();
		}
		if (is_pay==3){
			$(".checkpay").show();
			$("#aui-footer").css("height","90px");
		}
		if (is_pay==1){
			$("#aui-footer").css("height","50px");
		}
		var iosstatusheight=getisostatusheight();
        var body_h = $api.offset($api.dom('body')).h;
        var footer_h = $api.offset($api.byId("aui-footer")).h;
        api.openFrame({
            name: 'check_show',
            url: 'check_show.html',
            bounces: true,
            vScrollBarEnabled:false,
            hScrollBarEnabled:false,
            pageParam:api.pageParam,
            rect: {
                x: 0,
                y: iosstatusheight+46,
                w: 'auto',
                h: body_h - footer_h
            },
            bgColor : '#f2f2f2'
        });
        $(".buy").on("click",function(){
        	if (confirm("你确定未支付并审核通过吗？")){
	        	api.execScript({
					frameName:"check_show",
					script : "nopaycheck()"
				});
			}
		})
		$(".blue").on("click",function(){
			if (confirm("你确定已经支付并审核通过吗？")){
	        	api.execScript({
					frameName:"check_show",
					script : "paycheck()"
				});
			}
		})
		$(".checkpay").on("click",function(){
			if (confirm("你确定已经支付吗？")){
	        	api.execScript({
					frameName:"check_show",
					script : "nopaysh()"
				});
			}
		})
    }
    function gettotal(total){
    	$(".allje").html(total)
    }
    function closeWin(){
        api.closeWin();
    }
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
