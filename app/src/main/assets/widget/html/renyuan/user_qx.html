<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
	    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
	    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
	    <title>title</title>
	    <link rel="stylesheet" type="text/css" href="../../css/api.css" />
	    <link rel="stylesheet" type="text/css" href="../../css/aui.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/common.css"/>
	</head>
	<body>
	<div class="aui-content">
        <div class="aui-form">
        	<div class="aui-input-row">
                <label class="aui-input-addon">过磅定价</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="price">
            </div>
            <div class="aui-input-row">
                <div class="aui-pull-right">
                    <input class="aui-checkbox" name="qx_type" type="checkbox" value="price_dj">
                    <div class="aui-checkbox-name">定价</div>
                    <input class="aui-checkbox" name="qx_type" type="checkbox" value="price_bd">
                    <div class="aui-checkbox-name">补单</div>
                    <input class="aui-checkbox" name="qx_type" type="checkbox" value="price_zf">
                    <div class="aui-checkbox-name">作废</div>
                    <input class="aui-checkbox" name="qx_type" type="checkbox" value="price_xg">
                    <div class="aui-checkbox-name">修改</div>
                </div>
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">付款审核</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="price_sh">
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">收货明细</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="tongji_mingxi">
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">日付款统计</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="tongji_daypay">
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">数据汇总</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="tongji_all">
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">分站管理</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="fengzhan">
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">供应商管理</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="gongyinshang">
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">产品管理</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="products">
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">人员管理</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="users">
            </div>
            <div class="aui-input-row">
                <label class="aui-input-addon">报价群发</label>
                <input class="aui-pull-right aui-checkbox aui-checkbox-success" name="qx_type" type="checkbox" value="price_qufa">
            </div>
            <div style="height: 50px"></div>
            
        </div>
        <div style="position: fixed;bottom: 0px;display: block;width: 100%;margin-bottom: 10px" class="aui-text-center"><div class="aui-btn aui-btn-success userqxsave" style="width: 50%">保存</div></div>
    </div>

<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
	<script>
		
	apiready = function(){
		changeserverurl();
		id=api.pageParam.id;
		var data={
			id:id
		}
		if (id){
			loadingshow();
			zzappajax("post",hosturl+"app/user_qx.html",data,function(ret){
				api.hideProgress();
				if (ret.err=="false"){
					var myuser_qx = ret.result;
					//alert(JSON.stringify(ret.result))
					$.each(ret.result,function(i,item){
						//alert(item)
						$(":checkbox[name=qx_type][value='"+item+"']").prop("checked",true);
					})
				}else{
					layer.msg(ret.errtext)
				}
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				api.hideProgress();
				return false;
			})
		}
		$(".userqxsave").on("click", function() {
			var qx_type=""
			$(":checkbox[name=qx_type]:checked").each(function() {
				qx_type=qx_type+$(this).val()+"|"
			});
			//alert(JSON.stringify(qx_type))
			var data={
				id:id,
				qx_type:qx_type,
			}
			zzappajax("post",hosturl+"app/user_qx_save.html",data,function(ret){
				api.hideProgress();
				if (ret.err=="false"){
					layer.msg("设置成功");
					api.closeWin({
                    });
				}else{
					layer.msg(ret.errtext)
				}
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				api.hideProgress();
				return false;
			})
		})
	};
	
	</script>
		</body>
</html>
