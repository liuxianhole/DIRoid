	    }
	    #wrap{
	        height: 100%;
	        display: -webkit-box;

<body >
	<div id="wrap">
		<div id="header">
			<header class="aui-bar aui-bar-nav aui-bar-primary zz-header aui-border-b aui-bg-success">

					<a class="aui-pull-left" onclick="closewindows()">

		    	<div>

		    		<a class="aui-pull-left" >

				    <!-- <div class="aui-title">
				    	联系人
				    </div> -->

			</header>
		</div>

	</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>

<script type="text/javascript" src="../../script/jQuery.md5.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var keybackflag = 1;
	apiready = function(){
		var header = $api.byId('header');
        //适配iOS 7+，Android 4.4+状态栏
        $api.fixStatusBar(header);
		var wintitle = api.pageParam.wintitle;
		var url      = api.pageParam.url;
		if(api.pageParam.headerTheme == "light"){
			$(".zz-header").removeClass("aui-bg-success aui-bar-primary").addClass("header-light");
		}
		if(wintitle.length>0){
			$(".j_wintitle").html(wintitle);
			$(".header-modle").eq(1).addClass("aui-hide")
			$(".header-modle").eq(2).removeClass("aui-hide")
		}else{
			$(".header-modle").eq(0).addClass("aui-hide")
			$(".header-modle").eq(1).removeClass("aui-hide")
		}
		//获得更新token
        var login_sn = UserInfo.has_login();
		if (login_sn){
			tokeninfo();
		}
		if(url){
			loadcommonurl(url, api.pageParam);
		}
		api.addEventListener({
		    name:'keyback'
		},function(ret,err){
			if (keybackflag==0){
		    	return false;
		    }else{
		    	closewindows();
		    }
		});
		domEvent();
	};
	var domEvent = function(){
   		$(".j_myinfo").on("click",function(){
   			var pageParam = {
				wintitle : "个人信息管理",
				type : "myinfo",
				bounces : false
			};
   			openWin("myinfo", "../myrc/myinfo.html", pageParam);
   		})
   }
	var closewindows = function(){
		api.closeWin();
	} 
	//返回标志重置
	function keybackFun(flag){
		keybackflag=flag;
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
