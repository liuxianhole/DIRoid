<!doctype html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
		<title>筛选</title>
		<link rel="stylesheet" type="text/css" href="../../css/api.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/aui.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/common.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/choice.css"/>
		<style>
			html, body {
				background: transparent;
				height: 100%;
				background: rgba(0,0,0,0.1);
				overflow: hidden;
			}
			#aui-header {
				position: absolute;
				top: 85px;
				left: 5%;
				right: 5%;
				width: 90%;
				padding-top: 0px;
			}
			.type-small {
				background-color: #fff;
				border-top: none;
				overflow: auto;
				position: absolute;
				bottom: 120px;
				top: 130px;
				left: 5%;
				right: 5%;
				width: 90%;
				color: #666
			}
		</style>
	</head>
	<body>
		<header class="aui-bar aui-bar-nav aui-bar-success" id="aui-header">
			<a class="aui-btn aui-btn-success aui-pull-left"> <span class="aui-iconfont aui-icon-info"></span> </a>
			<a class="aui-btn aui-btn-success aui-pull-right" tapmode onclick="closeselect()"> <span class="aui-iconfont aui-icon-roundclosefill"></span> </a>
			<div class="aui-title">
				请选择产品
			</div>
		</header>
		<div class="type_small">
			<div>
				<ul class="type-small small-area">
					<li class="prolist">
						
					</li>
				</ul>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="../../script/api.js"></script>
	<script type="text/javascript" src="../../script/jquery.js"></script>
	<script type="text/javascript" src="../../script/zepto.min.js"></script>
	<script type="text/javascript" src="../../script/common.js"></script>
	<script type="text/javascript" src="../../script/laytpl.js"></script>
	<script type="text/javascript" src="../../script/iscroll.js"></script>
	<script type="text/javascript">
		function closeselect() {
			api.execScript({
				name : api.winName,
				script : "keybackFun('1')"
			});
			api.closeFrame();
		}

		apiready = function() {
			changeserverurl();
			var prolist=api.pageParam.prolist;
			var prostr=""
			$.each(prolist,function(i,item){
				//alert(item.id)
				prostr=prostr+"<span self_id='"+item.self_id+"'><i></i>"+item.name+"</span>"
			})
			$(".prolist").html(prostr)
			//选择地区
			$(".small-area span").on("click", function() {
				$(".small-area span").removeClass("take-now-span")
				$(this).toggleClass("take-now-span");
				var proname=$(this).text();
				var self_id=$(this).attr("self_id")
				closeselect()
                api.execScript({
					name : api.winName,
					frameName : api.winName+'_',
					script : "selectpro('"+self_id+"','"+proname+"')"
				});
			});
			var $body = $api.dom('body');
			$api.addEvt($body, 'click', function(e) {
				if (e.target == $body) {
					closeselect();
				} else {
					e.stopPropagation();
				}
			});
		}
		

		function selectbutton() {
			var timeselect = "";
			var provincelist = "";
			$(".take-now-span").each(function() {
				if ($(this).text() != "全部" && $(this).text() != "不限") {
					provincelist = provincelist + $(this).text() + "|";
				}
			});
			if (api.winName=="root"){
				api.execScript({
					name : api.winName,
					frameName : 'index-frame',
					script : "intoCity('" + provincelist + "')"
				});
			}else{
				api.execScript({
					name : api.winName,
					frameName : api.winName+'_',
					script : "intoCity('" + provincelist + "')"
				});
			}
			closeselect()
		}
	</script>
	<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
