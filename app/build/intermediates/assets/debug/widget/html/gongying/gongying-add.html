<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../css/api.css" />
    <link rel="stylesheet" type="text/css" href="../../css/aui.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/common.css"/>
    <style>
    	.db-gy-title{
			width: 80px;
			text-align: right;
			color: #2ecc71
		}
		.gy-right-btn {
		    width: 60px;
		    text-align: right;
		}
    </style>
</head>
<body>
	<div class="db-bg-white">
		<div class="aui-padded-15  zz-div-box aui-padded-t-20">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">联系人</div>
			<div class="zz-div-td1">
				<input type="text" class="aui-margin-b-0 mustipt db-input contact"  >
			</div>
			<div class="gy-right-btn">
			</div>
		</div>
		<div class="aui-padded-15  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">联系电话</div>
			<div class="zz-div-td1">
				<input type="text" class="aui-margin-b-0 mustipt db-input mobile"  >
			</div>
			<div class="gy-right-btn">
			</div>
		</div>
		<div class="aui-padded-15  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">地址</div>
			<div class="zz-div-td1">
				<input type="text" class="aui-margin-b-0 mustipt db-input address" >
			</div>
			<div class="gy-right-btn">
			</div>
		</div>

		<div class="aui-padded-15  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title"></div>
			<div class="zz-div-td1">
				<div class="aui-btn aui-btn-success j_btn">&nbsp;保存&nbsp;</div>
			</div>
		</div>
	</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var id = "";
	apiready = function(){
		changeserverurl()
		id=api.pageParam.pid;
		var data={
			id:id
		}
		if (id){
			loadingshow();
			zzappajax("post",hosturl+"app/supplier_mod.html",data,function(ret){
				api.hideProgress();
				if (ret.err=="false"){
					$(".contact").val(ret.result.contact)
					$(".mobile").val(ret.result.mobile)
					$(".address").val(ret.result.address)
					api.hideProgress();
				}else{
					layer.msg(ret.errtext)
				}
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				api.hideProgress();
				return false;
			})
		}
		domEvent();
	};
	
	var canAjax = true;
	var domEvent = function(){
		
		$(".j_btn").on("click",function(){
			if(!canAjax){
				return;
			}
			var contact = $(".contact").val();
			var mobile = $(".mobile").val();
			var address = $(".address").val();
			if (contact.length == 0) {
				hint("联系人不能为空！");
				api.hideProgress();
				return;
			}
			canAjax = false;
			var data = {
				contact:contact,
				mobile:mobile,
				address:address,
				id:id,
				isapp:1
			}
			api.showProgress({
				title : '',
				modal : false
			});
			zzappajax("post",hosturl+"app/supplier_save.html",data,function(ret){
				if(ret.err=="false"){
					canAjax = true;
					api.alert({
						title : '供应商信息',
						msg : '保存成功！',
						buttons : ['确定']
					}, function(ret, err) {
						api.execScript({
							name : "gongying",
							frameName:"gongying_",
							script : "page = 1;getinfo()"
						});
						api.closeWin({
                        });
						
					});
				}else{
					hint(ret.errtext);
					canAjax = true;
				}
				
				api.hideProgress();
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				canAjax = true;
				api.hideProgress();
				return false;
			})
		})
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
