<script type="text/javascript">
	apiready = function(){

			bgColor : '#E6E6E6',

			getuserqx();

		//人员管理

		//补单

		//产品类别管理

		//分站管理

		//入库明细
		$(".j_mingxi").on("click",function(){

		$(".j_huizong").on("click",function(){

		$(".j_gongying").on("click",function(){

				bounces : false
			};
   			openWin("gongying", "../gongying/gongying.html", pageParam);
		})
		
		//带定价榜单
		$(".j_bangdan").on("click",function(){

		getinfo();
		getuserqx();

	function getuserqx(){
		zzappajax("post",hosturl+"app/getuser_qx.html",'',function(ret){
			$(".j_bangdan").show();
			$(".j_bangdandel").show();
			$(".j_huizong").show();
			$(".j_mingxi").show();
			$(".j_gongying").show();
			$(".j_fenzhan").show();
			$(".j_chanping").show();
			$(".j_renyuan").show();
			$(".j_check").show();
			
			if (ret.hasOwnProperty("tokenerr")){
				return false
			}
			if (ret){
				if (ret.indexOf("price")<0){
					$(".j_bangdan").hide();
				}
				if (ret.indexOf("price_zf")<0){
					$(".j_bangdandel").hide();
				}
				if (ret.indexOf("price_bd")<0){
					$(".j_add").hide();
				}
				if (ret.indexOf("price_sh")<0){
					$(".j_check").hide();
				}
				if (ret.indexOf("tong_ji_all")<0){
					$(".j_huizong").hide();
				}
				if (ret.indexOf("tong_ji_ming_xi")<0){
					$(".j_mingxi").hide();
				}
				if (ret.indexOf("gong_yin_shang")<0){
					$(".j_gongying").hide();
				}
				if (ret.indexOf("feng_zhan")<0){
					$(".j_fenzhan").hide();
				}
				if (ret.indexOf("products")<0){
					$(".j_chanping").hide();
				}
				if (ret.indexOf("users")<0){
					$(".j_renyuan").hide();
				}
			}
			api.refreshHeaderLoadDone();
		},function(err){
			if(err){
				saveerrlog(err.body);
			}
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		})
	}
	var getinfo = function(){
		var utype="";
		zzappajax("post",hosturl+"app/get_num.html",'',function(ret){
			var utype=ret.utype
			if(parseInt(ret.count)>0){
				$(".bd_num").html(ret.count);
				$(".bd_num").show();
			}else{
				$(".bd_num").hide();
			}
			if (utype=="1"){
				$(".j_fenzhan").show();
			}
			if (utype=="1" || utype=="4"){
				$(".j_renyuan").show();
			}
			api.refreshHeaderLoadDone();
		},function(err){
			if(err){
				saveerrlog(err.body);
			}
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		})
	}
	function getsocketbandang(){
		var socketManager = api.require('socketManager');
		socketManager.createSocket({
		    host: '101.37.14.79',
		    port: 6969
		}, function(ret, err) {
		    if (ret) {
		    	sid=ret.sid;
		        //alert(JSON.stringify(ret));
		        if (ret.state==103 && ret.data=="storageinsert"){
		        	getinfo();
		        }
		        if (ret.state==102){
		        	writesocketbandang()
		        }
				if (ret.state==204){
		        	getsocketbandang()
		        }
		        
		    } else {
		        //alert(JSON.stringify(err));
		        getsocketbandang()
		    }
		});
	}
	function writesocketbandang(){
		var socketManager = api.require('socketManager');
		socketManager.write({
		    sid: sid,
		    data: '{"sendvalue":"updatestorage","company_id":'+UserInfo.memberID()+'}|'
		}, function(ret, err) {
		    
		});
	}
</script>
