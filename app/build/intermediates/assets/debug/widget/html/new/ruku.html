<!doctype html>
<html>
	<head>
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
		<meta content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport" />
		<meta content="telephone=no" name="format-detection" />
		<meta content="address=no" name="format-detection" />
		<meta name="apple-mobile-web-app-capable" content="no" />
		<link rel="apple-touch-icon-precomposed" href="http://img0.zz91.com/zz91/images/logo.png" />
		<link rel="apple-touch-icon-precomposed" sizes="114x114" href="apple-touch-icon-precomposed" />
		<meta name="apple-touch-fullscreen" content="YES">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black">
		<link rel="shortcut icon" href="https://img0.zz91.com/front/favicon.ico" />
		<title>互助社区-zz91再生网</title>
        <script type="text/javascript" src="../../script/jquery.js"></script>
		<link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>
		<script type="text/javascript" src="../../script/layer/layer.js"></script>
		<link rel="stylesheet" type="text/css" href="https://m.zz91.com/zt/dibang/css/index.css">
	</head>
	<body>
		<div style="height:2.25rem;">
			<header class="aui-bar aui-bar-nav  aui-border-b ">
		    	<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript :history.back(-1)">
			        <span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
			    </a>
			    <div class="aui-title">入库明细</div>
			</header>
		</div>

		<div class="searchbox aui-bg-ff">
			<div class="aui-tab zz-div-box" id="tab">
			    <div class="rkitem aui-active zz-div-td3 phtype">供应商</div>
			    <div class="rkitem phtype zz-div-td2">品名</div>
			    <div class="rkitem zz-div-td2 phtype">分站</div>
			    <div class="rkitem phtype zz-div-td4">榜单编号</div>
			    <div class="rkitem phtype zz-div-td4">入场时间</div>
			    <div class="rkitem zz-div-td2 phtype">单价</div>
			</div>
			<div class="search-name aui-row aui-padded-md aui-border-b">
				<div class="aui-col-xs-9"><input class="search-ipt" value="" placeholder="请输入供应商名"/></div>
				<div class="aui-col-xs-3 aui-text-right">
					<div class="aui-btn aui-btn-info j_search_btn"><i class="iconfont aui-font-size-14">&#xe633;</i>搜索</div>
				</div>
			</div>
		</div>

		<div style="height: 15px;" class="aui-border-b"></div>

		<div class="ruku"></div>
		<div class="aui-text-center aui-padded-15 aui-text-999 nodata" style="display:none;">暂无相关数据</div>

		<script id="itemTpl" type="text/html">
			<div class="aui-card-list aui-border-b">
				<div class="aui-card-list-header">
					<div>{{d.contact || ''}}</div>
					<div class="aui-font-size-14 aui-text-66">{{d.gmt_created || ''}} {{d.company_name || ''}}</div>
				</div>
				<div class="aui-card-list-content-padded aui-border-b aui-border-t zz-div-box aui-bg-default">
					<div class="column-cnt font_bold cpname">{{d.product_name || ''}}</div>
					<div class="zz-div-box zz-div-td1">
						<div class="zz-div-td1">
							<div><span class="aui-text-66">毛重：</span>{{d.gw || ''}}</div>
							<div><span class="aui-text-66">皮重：</span>{{d.tare || ''}}</div>
						</div>
						<div class="zz-div-td1">
							<div>&nbsp;</div>
							<div><span class="aui-text-66">净重：{{d.nw || ''}}</span></div>
						</div>
					</div>
					<div class="column-cnt aui-text-center">{{d.piclist ? '已拍照' : '未拍照'}}</div>
				</div>
				<div class="aui-card-list-content-padded aui-border-b zz-div-box aui-font-size-12 ruzm">
					<div class="zz-div-td1 aui-text-99">磅单编号：{{d.iccode || ''}}</div>
					<div class="zz-div-box cpmoery">
						<div class="cpmoery-danjia column-cnt">单价：<span class="aui-text-danger">{{d.price || ''}}</span></div>
						<div class="zz-div-td1 column-cnt">总额：<span class="aui-text-danger">{{d.total || ''}}</span></div>
					</div>
				</div>
			</div>
		</script>

		<div style="height: 60px;"></div>
		<div class="zz-div-box aui-bg-ff aui-border-t aui-font-size-14 aui-padded-15 mxall" style="display:none;">
			<div class="zz-div-td1">合计</div>
			<div class="aui-padded-l-15 aui-padded-r-15">入库量：<span class="aui-text-danger total_count"></span></div>
			<div class="zz-div-td1">总金额：<span class="aui-text-danger total_price"></span></div>
		</div>
	</body>
</html>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var phList = ["供应商名","产品名称","分站名称","磅单编号","入场时间","产品单价"];
	var searchTypes = ["supplier","product_name","company_name","iccode","gmt_created","price"];

	apiready = function(){
		changeserverurl();
		bindEvent();
		getinfo();
	};

	function bindEvent(){
		$(".phtype").on("click", function(){
			var index = $(this).index();
			$(".aui-active").removeClass("aui-active");
			$(this).addClass("aui-active");
			$(".search-ipt").attr("placeholder", "请输入" + phList[index]);
		});
		$(".j_search_btn").on("click", function(){
			getinfo();
		});
	}

	function getinfo(){
		var index = $(".phtype").index($(".aui-active"));
		var data = {
			page: 1,
			searchtype: searchTypes[index] || "supplier",
			searchinfo: $(".search-ipt").val()
		};
		zzappajax("post", hosturl + "app/storage.html", data, function(ret){
			var list = ret.listall || [];
			var html = "";
			$.each(list, function(i, item){
				var tpl = $api.html($api.byId("itemTpl"));
				laytpl(tpl).render(item, function(rendered){
					html += rendered;
				});
			});
			$(".ruku").html(html);
			$(".total_count").text(ret.listcount || "");
			$(".total_price").text(ret.total_price || "");
			$(".mxall").toggle(list.length > 0);
			$(".nodata").toggle(list.length === 0);
		}, function(err){
			if(err){
				saveerrlog(err.body);
			}
			$(".ruku").html("");
			$(".mxall").hide();
			$(".nodata").show();
		});
	}
</script>
