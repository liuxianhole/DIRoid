<script type="text/javascript">
	//	编辑
	$(".j_bjbtn").on("click",function(){
		layer.open({
		  type: 1,
		  title:false,
		  skin: 'layui-pop-gy', //样式类名
		  closeBtn: 1, //不显示关闭按钮
		  anim: 2,
		  area:["90%",""],
		  shadeClose: true, //开启遮罩关闭
		  content: $(".pop-gy")
		});
	})
	
	$(".j_close").on("click",function(){
		layer.closeAll()
	})
	
	$(".j_delgy").on('click',function(){
		layer.confirm('确定删除信息？', {
		  btn: ['确定','取消'] //按钮
		}, function(){
		  layer.msg('删除成功', {icon: 1});
		}, function(){
		  layer.closeAll()
		});
	})
</script>
