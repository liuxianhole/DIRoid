<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../css/api.css" />
    <link rel="stylesheet" type="text/css" href="../../css/aui.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/common.css"/>	
    <style>

    	.pop-dingjia{
    		width: 100%;
    	}
    	.db-gy-title {
		    width: 80px;
		    text-align: right;
		    color: #2ecc71;
		}
    </style>
</head>
<body>
	<div class="db-bg-white pop-dingjia popmain">
		<div class="aui-padded-10  zz-div-box">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">供应商</div>
			<div class="zz-div-td1 supplier_name">
				
			</div>
		</div>
		<div class="aui-padded-10  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">产品名称</div>
			<div class="zz-div-td1">
				<div class="db-select-box">
					<span class="aui-btn aui-btn-outlined selectproducts">请选择产品名称</span>
				</div>
				<input type="hidden" id="proself_id" value="">
			</div>
		</div>
		<div class="aui-padded-10  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">毛重</div>
			<div class="zz-div-td1 gw">
				
			</div>
		</div>
		<div class="aui-padded-10  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">是否0皮重</div>
			<div class="zz-div-td1">
				<input type="radio" name="tare_check" class="tare_check" value="1"/>是
				<input type="radio" name="tare_check" class="tare_check" value="0" checked=""/>否
			</div>
		</div>
		<div class="aui-padded-10  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">扣杂</div>
			<div class="zz-div-td1">
				<input type="number" style="width: 60%;" class="aui-margin-b-0 mustipt db-input clasp" name="clasp" value="0">
				千克
			</div>
		</div>
		<div class="aui-padded-10  zz-div-box aui-padded-t-0">
			<div class="column-cnt aui-padded-r-10 aui-font-size-18 db-gy-title row-right">确定定价</div>
			<div class="zz-div-td1">
				<input type="number" class="aui-margin-b-0 mustipt db-input now_price" >
			</div>
		</div>
		<div class="aui-padded-10  aui-padded-t-0 aui-text-center">
			
			<span class="aui-btn aui-btn-info j_btn">&nbsp;确定价格&nbsp;</span>
			&nbsp;&nbsp;&nbsp;
			<span class="aui-btn close-pop">&nbsp;关闭&nbsp;</span>
		</div>
		<input type="hidden" id="sid" value="0">
	</div>

</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	apiready = function(){
		changeserverurl()
		
		$(".close-pop").on("click",function(){
			api.closeWin({
            });;
		})
		
		into();	// 获取供应信息
		domEvent();
	};
	function selectpro(self_id,name){
		$(".selectproducts").html(name);
		$("#proself_id").val(self_id);
	}
	var canbtn = true;
	var tare_check=0;
	var domEvent = function(){
		//产品类别变化获取产品名称
		//选择地区
		$(".selectproducts").on("click", function() {
			openwindows("selectproduct", 'selectproduct.html')
		})
		$(".tare_check").on("click", function() {
			tare_check=$(this).val();
		})
		//确定价格
		$(".j_btn").on("click",function(){
			if(!canbtn){
				return;
			}
			if ($("#proself_id").val()==""){
				layer.msg("请选择产品名称！");
				return false;
			}
			if ($(".now_price").val()==""){
				layer.msg("请输入价格！");
				$(".now_price").focus();
				return false;
			}else{
				var isnumflag=isNaN($(".now_price").val());
				if (isnumflag){
					layer.msg("价格必须是数字！")
					return false;
				}
			}
			tare_check=$('input[name="tare_check"]:checked').val();
			//alert(tare_check)
			var data = {
				id:$("#sid").val(),
				products_self_id:$("#proself_id").val(),
				price:$(".now_price").val(),
				user_self_id:UserInfo.self_id(),
				tare_check:tare_check,
				clasp:$(".clasp").val(),
			}
			canbtn = false;
			api.showProgress({
				title : '',
				modal : false
			});
			zzappajax("post",hosturl+"app/pricing_now_save.html",data,function(ret){
				if(ret.err == "false"){
					api.execScript({
						name : "bangdan",
						frameName:"frame1",
						script : "page = 1;getinfo()"
					});
					api.execScript({
						name : "bangdan",
						frameName:"frame3",
						script : "page = 1;getinfo()"
					});
					api.execScript({
						name : "bangdan",
						frameName:"frame4",
						script : "page = 1;getinfo()"
					});
					api.execScript({
						name : "root",
						frameName:"main",
						script : "getinfo()"
					});
					api.closeWin({});
				}
				api.hideProgress();
				canbtn = true;
			},function(err){
				if(err){
					saveerrlog(err.body);
				}
				canbtn = true;
				api.hideProgress();
				return false;
			})
		})
	}
	var into = function(){
		//$(".supplier_name").html(api.pageParam.bdinfo.supplier_name);
		//$(".gw").html(api.pageParam.bdinfo.gw);
		//$(".price").html(api.pageParam.bdinfo.price);
		var data = {
			storage_self_id:api.pageParam.storage_self_id,
		}
		api.showProgress({
			title : '',
			modal : false
		});
		//获取产品名称
		zzappajax("get",hosturl+"app/pricing_show.html",data,function(ret){
			api.hideProgress();
			api.pageParam['prolist']=ret.result.productslist;
			$("#sid").val(ret.result.id);
			$(".supplier_name").html(ret.result.supplier_name);
			$(".gw").html(ret.result.gw);
			$(".price").html(ret.result.price);
			openwindows("selectproduct", 'selectproduct.html')
			api.hideProgress();
		},function(err){
			if(err){
				saveerrlog(err.body);
			}
			api.hideProgress();
			return false;
		})
		
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
