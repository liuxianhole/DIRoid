<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>待审核</title>
	<link rel="stylesheet" type="text/css" href="../../css/aui.css">
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/common.css"/>
</head>
<body >
	<div class="bdlist-box">
		<div class="aui-toast"  id="loading">
	        <div class="aui-toast-loading"></div>
	        <div class="aui-toast-content">加载中</div>
	    </div>
	</div>
	<script id="bdlist" type="text/html">
	<div class="aui-content">
        <ul class="aui-list-view">
            <li class="aui-list-view-cell btn-dj" tapmode storage_selfid="{{d.selfid}}">
                <div>
                    {{d.supplier_name}}<span style="color:#999">（{{d.status}}）{{d.stype}} {{d.ispay}}</span>
                    <span class="aui-badge aui-badge-info aui-pull-right">{{d.product_name}}</span>
                    <p class="aui-flex-col">
                    	<div class="aui-flex-item-4">
			                	毛重：{{d.gw}}
			            </div>
			            <div class="aui-flex-item-4">
			            	皮重：{{d.tare}}
			            </div>
			            <div class="aui-flex-item-4">
			            	扣杂：{{d.clasp}}
			            </div>
			        </p>
			        <p class="aui-flex-col">
			        	<div class="aui-flex-item-4">
			            	净重：{{d.nw}}
			            </div>
                    	<div class="aui-flex-item-4">
			                                               单价：{{d.price}}
			            </div>
			            <div class="aui-flex-item-4">
			            	支付：<span class="edittotal" sid="{{d.id}}"><font>{{d.total}}</font><img src="../../image/edit.png" /></span>
			            </div>
			        </p>
			        <p class="aui-flex-col">
			        	<div class="aui-flex-item-6">
			                <div class="aui-text-info pic" sid="{{d.id}}" storage_selfid="{{d.selfid}}">
			                    {{# if (d.piclist!=""){ }}
			                    <i class="aui-iconfont aui-icon-pic aui-bg-primary"></i>
			                    {{# }else{ }}
			                    <i class="aui-iconfont aui-icon-pic aui-bg-default"></i>
			                    {{#  } }}
			                    {{d.company_name}}
			                </div>
			            </div>
			            <div class="aui-flex-item-6 aui-text-right aui-text-default">
			            	{{d.gmt_created}}
			            </div>
			        </p>
                </div>
            </li>
        </ul>
    </div>
	</script>
	
<div class="nodata">暂无待审核磅单</div>
<div class='la_more'>上拉获取更多信息</div>
<body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript">
	var page = 1;
	var pagecount=0;
	var bdinfo =[]; //保存数据页面传值
	var iccode ="";
	var sid=0;
	apiready = function(){
		changeserverurl()
		getinfo();
		api.addEventListener({
			name : 'scrolltobottom'
		}, function(ret, err) {
			if (page>=pagecount){
				$(".la_more").html("全部加载完毕");
				return false;
			}
			$(".la_more").html("加载更多中...");
			setTimeout(function() {
				page +=1;
				getinfo();
			}, 10)
		});
		
		//页面刷新
		api.setRefreshHeaderInfo({
			visible : true,
			// bgColor: '#F2F2F2',
			bgColor : '#E6E6E6',
			textColor : '#000000',
			textDown : '下拉刷新',
			textUp : '释放刷新',
		}, function(ret, err) {
		
			$(".ipt-search").val("");//搜索框置空
			iccode = "";
			page = 1;
			getinfo();
			api.toast({
				msg : '数据已是最新！',
				duration : 3000,
				location : 'bottom'
			});
		});
		
		$(".bdlist-box").on("click",".pic",function(){
			var sid=$(this).attr("sid");
			var storage_selfid=$(this).attr("storage_selfid");
			var pageParam = {
				wintitle : "现场照片",
				type : "piclist",
				bounces : false,
				storage_selfid:$(this).attr("storage_selfid")
			};
			openWin("piclist", "../mingxi/piclist.html", pageParam);
		})
		$(".bdlist-box").on("click",".edittotal",function(){
			var sid=$(this).attr("sid");
			var self=$(this);
			var total=$(this).find("font").text();
			layer.prompt({title: '修改总价',value:total}, function(val, index){
				var isnumflag=isNaN(val);
				if (isnumflag){
					layer.msg("必须是数字！")
					return false;
				}
				var data={'id':sid,'total':val}
				layer.load(2)
				zzappajax("post",hosturl+"app/realtotal_save.html",data,function(ret){
					if (ret.err=="false"){
						layer.msg("修改成功！");
						getinfo();
					}else{
						layer.msg(ret.errtext)
					}
					layer.closeAll("loading")
				},function(err){
					layer.closeAll("loading")
				});
				//layer.msg(val)
				layer.close(index);
			});
		})
	};
	//未支付确认已经支付
	function nopaysh(){
		var data={
			ispay:1,
			suppliers_selfid:api.pageParam.suppliers_selfid
		}
		zzappajax('post',hosturl+'app/storage_pay.html',data,function(ret){
			if (ret.err=='false'){
				var suc=layer.msg("审核成功！");
				if (suc){
					api.execScript({
						name : "j_check",
						frameName:"checknopay",
						script : "getinfo()"
					});
					api.closeWin({
	                });
				}
			}else{
				return false;
			}
		},function(err){
			if(err){
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	}
	function nopaycheck(){
		var data={
			ispay:3,
			suppliers_selfid:api.pageParam.suppliers_selfid
		}
		zzappajax('post',hosturl+'app/storage_check.html',data,function(ret){
			if (ret.err=='false'){
				var suc=layer.msg("审核成功！");
				if (suc){
					api.execScript({
						name : "j_check",
						frameName:"nocheck",
						script : "getinfo()"
					});
					api.closeWin({
	                });
				}
			}else{
				return false;
			}
		},function(err){
			if(err){
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	}
	function paycheck(){
		var data={
			ispay:1,
			suppliers_selfid:api.pageParam.suppliers_selfid
		}
		zzappajax('post',hosturl+'app/storage_check.html',data,function(ret){
			//alert(JSON.stringify(ret))
			if (ret.err=='false'){
				layer.msg("审核成功！");
				api.execScript({
					name : "j_check",
					frameName:"nocheck",
					script : "getinfo()"
				});
				api.closeWin({
                });
			}else{
				return false;
			}
		},function(err){
			//alert(JSON.stringify(err))
			if(err){
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		});
	}
	var getinfo = function(){
		//alert(api.pageParam.suppliers_selfid)
		var data = {
			suppliers_selfid:api.pageParam.suppliers_selfid,
			ispay:api.pageParam.ispay,
			jiesuan:1,
			page:page,
		}
		if (page==1){
			//loadingshow();
		}
		zzappajax("post",hosturl+"app/storage.html",data,function(ret){
			//alert(JSON.stringify(ret))
			if (ret.hasOwnProperty("err")){
				if (ret.err=="true"){
					layer.msg(ret.errtext);
					api.hideProgress();
					api.refreshHeaderLoadDone();
					loadinghide();
					return false;
				}
			}
			var pageHtml_dj='';
			$.each(ret.listall, function(index, item) {
				var getTpl = $api.html($api.byId("bdlist"));
				laytpl(getTpl).render(item, function(html) {
					pageHtml_dj = pageHtml_dj + html;
				});
			})
			
			if (page == 1) {
				bdinfo = [];
				pagecount=ret.page_listcount;
				if (pageHtml_dj==""){
            		$(".nodata").show();
            		$(".la_more").hide();
            	}else{
            		$(".nodata").hide();
            		$(".la_more").show();
                }
				$(".bdlist-box").html(pageHtml_dj);
			} else {
				$(".bdlist-box").append(pageHtml_dj);
			}
			api.execScript({
				name : "paycheck",
				frameName:"paycheck_",
				script : "gettotal('"+ret.total_price+"')"
			});
			//显示页码
			api.toast({
				msg : page+"/"+pagecount+"页",
				duration : 2000,
				location : 'bottom'
			});
			loadinghide();
		},function(err){
			if(err){
				saveerrlog(err.body);
			}
			canAjax = true;
			api.hideProgress();
			api.refreshHeaderLoadDone();
			return false;
		})
	}
</script>
<script type="text/javascript" src="../../script/servercomm.js"></script>
</html>
