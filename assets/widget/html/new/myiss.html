	<body>
		<div style="height:45px;">
			<header class="aui-bar aui-bar-nav  aui-border-b ">
				<a class="aui-pull-left" href="javascript:void(0)" onclick="javascript :history.back(-1)">
					<span class="iconfont">&#xe611;</span>&nbsp;&nbsp;
				</a>
				<div class="aui-title">
					个人资料
				</div>
			</header>
		</div>
		<div class="aui-content aui-margin-b-15 myiss">
			<ul class="aui-list aui-form-list">
				<li class="aui-list-item">
					<div class="aui-list-item-inner">
						<div class="aui-list-item-label">
							姓名：
						</div>
						<div class="aui-list-item-input">
							<input type="text" placeholder="请输入手机姓名">
						</div>
					</div>
				</li>
				<li class="aui-list-item">
					<div class="aui-list-item-inner">
						<div class="aui-list-item-label">
							性别：
						</div>
						<div class="aui-list-item-input">
							<label><input class="aui-radio" type="radio" name="demo1" checked> 男</label>
							<label><input class="aui-radio" type="radio" name="demo1"> 女</label>
						</div>
					</div>
				</li>
				<li class="aui-list-item">
					<div class="aui-list-item-inner">
						<div class="aui-list-item-label">
							手机：
						</div>
						<div class="aui-list-item-input">
							<input type="password" placeholder="请输入手机号码">
						</div>
					</div>
				</li>
				<li class="aui-list-item">
					<div class="aui-list-item-inner">
						<div class="aui-list-item-label">
							密码：
						</div>
						<div class="aui-list-item-input">
							<input type="number" placeholder="请输入密码">
						</div>
					</div>
				</li>
				<li class="aui-list-item">
					<div class="aui-list-item-inner">
						<div class="aui-list-item-input aui-text-right">
							<label><input class="aui-radio" type="checkbox" name="resnum"> 是否修改密码</label>
						</div>
					</div>
				</li>
				
			</ul>
			<div class="aui-padded-15 aui-bg-ff">
                <div class="aui-btn aui-btn-info aui-margin-r-5 aui-btn-block">保存</div>
            </div>
		</div>
		
		<div  class="outlogin">
			<a href="login.html" class="aui-text-info">
				退出重新登录
			</a>
		</div>
