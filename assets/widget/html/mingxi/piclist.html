<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../css/aui.css">
	<link rel="stylesheet" type="text/css" href="../../css/aui-flex.css"/>
	<link rel="stylesheet" type="text/css" href="../../css/common.css"/>
    <style>
    	body{
    		
    	}
    </style>
</head>
<body>
	<div class="picmain"></div>
	<script id="piclist" type="text/html">
	<div class="picbox aui-margin-t-10">
		<div class="aui-padded-md zz-div-box">
			<div class="column-cnt aui-text-66 aui-font-size-12">{{d.gmt_created}}</div>
		</div>
		<div class="picbox-md"><img src="{{d.pic}}" style="width: 100%" alt="" /></div>
	</div>
	</script>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/jquery.js"></script>
<script type="text/javascript" src="../../script/layer/layer.js"></script>
<script type="text/javascript" src="../../script/laytpl.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>

<script type="text/javascript">
	apiready = function(){
		changeserverurl();
		loadingshow();
		ajainfo()
	};
	function ajainfo(){
		var data={
			storage_self_id:api.pageParam.storage_self_id,
		}
		zzappajax("get",hosturl+"app/pic.html",data,function(ret){
			var pageHtml='';
			$.each(ret, function(index, item) {
				var getTpl = $api.html($api.byId("piclist"));
				laytpl(getTpl).render(item, function(html) {
					pageHtml = pageHtml + html;
				});
			})
			$(".picmain").html(pageHtml); //金额
			
			loadinghide();
		},function(err){
			if(err){
				saveerrlog(err.body);
			}
			api.hideProgress();
			return false;
		})
	}
</script>
</html>
